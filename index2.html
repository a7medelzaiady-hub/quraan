<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي الجميلة 🌟</title>
    
    <!-- استدعاء خط عربي جميل ومناسب من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">

    <style>
        /* إعدادات عامة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #f0f8ff; /* لون خلفية سماوي فاتح مريح للعين */
            background-image: radial-gradient(#fff 20%, transparent 20%), radial-gradient(#fff 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* تنسيق رأس الصفحة (العنوان) */
        header {
            text-align: center;
            padding: 30px 10px;
            background-color: #ff9ff3;
            color: white;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(255, 159, 243, 0.3);
            margin-bottom: 40px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* حاوية الكروت (لجعلها متوافقة مع الموبايل) */
        .cards-container {
            display: grid;
            /* هذا السطر يجعل الكروت تتكيف مع حجم الشاشة تلقائياً */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* تنسيق الكارت نفسه */
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none; /* إزالة الخط تحت الروابط */
            padding: 40px 20px;
            border-radius: 30px; /* حواف دائرية كبيرة */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease; /* تأثير حركي ناعم */
            position: relative;
            overflow: hidden;
            border: 4px solid white;
        }

        /* تأثير عند مرور الماوس أو اللمس (القفز لأعلى) */
        .card:hover, .card:active {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* أيقونات الكروت */
        .card .icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }

        /* نصوص الكروت */
        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            color: #2d3436;
        }

        .card p {
            margin: 0;
            font-size: 1.1rem;
            color: #636e72;
        }

        /* ألوان مختلفة لكل كارت */
        .card-1 { background-color: #ffeaa7; } /* أصفر */
        .card-2 { background-color: #81ecec; } /* أزرق فاتح */
        .card-3 { background-color: #fab1a0; } /* برتقالي/وردي فاتح */
        .card-4 { background-color: #55efc4; } /* أخضر فاتح */

    </style>
</head>
<body>

    <header>
        <h1>🎈 مكتبتي الممتعة 🎈</h1>
    </header>

    <main class="cards-container">
        
        <!-- الكارت الأول: السراج المنير -->
        <!-- تأكد أن اسم الملف في href يطابق اسم الملف في GitHub تماماً -->
        <a href="السراج المنير.html" class="card card-1">
            <div class="icon">📖</div>
            <h2>السراج المنير</h2>
            <p>هيا نقرأ ونتعلم معاً</p>
        </a>

        <!-- الكارت الثاني: الحياة السعيدة -->
        <!-- استبدل اسم الملف هنا بالاسم الكامل للملف المقطوع في الصورة -->
        <a href="اسم_الملف_الكامل_للحياة_السعيدة.html" class="card card-2">
            <div class="icon">🌈</div>
            <h2>الحياة السعيدة</h2>
            <p>قصص ونصائح جميلة</p>
        </a>

        <!-- الكارت الثالث: صفحة 2 -->
        <a href="index2.html" class="card card-3">
            <div class="icon">🚀</div>
            <h2>مغامرات جديدة</h2>
            <p>اضغط هنا لاكتشاف المزيد</p>
        </a>

        <!-- كارت رابع إضافي (يمكنك حذفه أو تعديله) -->
        <a href="#" class="card card-4">
            <div class="icon">🎨</div>
            <h2>ركن الألوان</h2>
            <p>ألعاب وتلوين</p>
        </a>

    </main>

</body>
</html>
