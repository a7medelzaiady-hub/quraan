<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مركز خادم القرآن - متابعة الحفظ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--green-deep:#0b1e14;--green-mid:#133020;--green-light:#1c422c;--gold:#d4af53;--gold-light:#ebd084;--white:#ffffff;--cream:#f9f5ee;--border:#dde8e0;--text:#1a1a1a;--sub:#5a6b61;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{direction:rtl;font-family:'Cairo',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden}

.hdr{background:linear-gradient(160deg,var(--green-deep) 0%,var(--green-mid) 100%);padding:20px 16px 24px;text-align:center;position:relative}
.hdr-emblem{width:56px;height:56px;margin:0 auto 10px;background:rgba(212,175,83,.15);border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px}
.hdr-title{color:var(--white);font-family:'Amiri',serif;font-size:22px;font-weight:700}
.hdr-subtitle{color:var(--gold-light);font-size:13px;font-weight:600;margin-top:6px}

.body{padding:14px 14px 100px}
.section{background:var(--white);border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-head{background:var(--green-mid);padding:11px 14px;border-radius:14px 14px 0 0}
.sec-head-title{color:var(--white);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-head-title i{color:var(--gold-light);font-size:16px}
.sec-body{padding:12px}

.flbl{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafcfa;outline:none}
.inp.num{text-align:center;font-size:14px;font-weight:700}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--green-mid);font-size:12px;pointer-events:none}
select.inp{padding-left:28px;cursor:pointer}

.ac-wrap{position:relative}
.ac-drop{display:none;position:absolute;top:calc(100% + 4px);right:0;left:0;background:var(--white);border:1.5px solid var(--green-mid);border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:200px;overflow-y:auto}
.ac-item{padding:9px 13px;font-size:13px;font-family:'Amiri',serif;cursor:pointer;border-bottom:.5px solid #eef4f0}

.surah-row, .q-row{display:grid;grid-template-columns:1fr 130px;gap:8px;margin-bottom:8px;background:var(--cream);border-radius:10px;padding:9px;border:1px solid var(--border);position:relative}
.q-row{grid-template-columns:1fr 1fr}
.del-btn{position:absolute;left:-6px;top:-6px;width:22px;height:22px;border-radius:50%;background:var(--white);border:1.5px solid #fca5a5;color:var(--red);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.range-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)}
.range-row.hidden{display:none}
.add-btn{width:100%;padding:8px;margin-top:2px;border:1.5px dashed var(--green-mid);border-radius:9px;background:transparent;color:var(--green-mid);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

.submit-wrap{position:fixed;bottom:0;right:0;left:0;background:var(--white);padding:12px 14px;border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:200}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green-mid),var(--green-light));color:var(--gold-light);border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-emblem">🕌</div>
  <div class="hdr-title">مركز خادم القرآن الكريم</div>
  <div class="hdr-subtitle">تحت إشراف الشيخ عبدالرحمن</div>
</div>

<div class="body">
  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-user"></i>بيانات الطالب</div></div>
    <div class="sec-body">
        <div class="flbl">اسم الطالب</div>
        <input class="inp" id="inp-student" placeholder="أدخل اسم الطالب...">
    </div>
  </div>

  <!-- الأقسام -->
  <div class="section"><div class="sec-head"><div class="sec-head-title"><i class="ti ti-book"></i>السور الجديدة</div></div><div class="sec-body"><div id="new-surahs"></div><button class="add-btn" onclick="addSurah('new-surahs','ns', true)"><i class="ti ti-plus"></i> إضافة سورة</button></div></div>
  <div class="section"><div class="sec-head"><div class="sec-head-title"><i class="ti ti-books"></i>ماضي السور</div></div><div class="sec-body"><div id="past-surahs"></div><button class="add-btn" onclick="addSurah('past-surahs','ps', false)"><i class="ti ti-plus"></i> إضافة سورة</button></div></div>
  <div class="section"><div class="sec-head"><div class="sec-head-title"><i class="ti ti-pencil"></i>المذكرة (الجديدة/الماضية)</div></div><div class="sec-body"><div id="notes-list"></div><button class="add-btn" onclick="addGeneric('notes-list','nt')"><i class="ti ti-plus"></i> إضافة بند مذكرة</button></div></div>
  <div class="section"><div class="sec-head"><div class="sec-head-title"><i class="ti ti-school"></i>السيرة</div></div><div class="sec-body"><div id="sira-list"></div><button class="add-btn" onclick="addGeneric('sira-list','sr')"><i class="ti ti-plus"></i> إضافة بند سيرة</button></div></div>
  <div class="section"><div class="sec-head"><div class="sec-head-title"><i class="ti ti-message-2"></i>الحديث</div></div><div class="sec-body"><div id="hadith-list"></div><button class="add-btn" onclick="addGeneric('hadith-list','hd')"><i class="ti ti-plus"></i> إضافة بند حديث</button></div></div>
</div>

<div class="submit-wrap"><button class="submit-btn" onclick="saveData()">حفظ البيانات</button></div>

<script>
var SURAS_PLAIN=['الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس','هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه','الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم','لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر','فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق','الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة','الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج','نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس','التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد','الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات','القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر','المسد','الإخلاص','الفلق','الناس'];
var counters={ns:0,ps:0,nt:0,sr:0,hd:0};

function getEvaluationHtml() {
    return `<div style="grid-column: 1 / -1; display:grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 5px; padding-top: 5px; border-top: 1px dashed #ccc;">
        <div class="sel-wrap"><select class="inp rating-sel"><option value="">التقييم</option><option value="ممتاز 🌟">ممتاز 🌟</option><option value="جيد جدا ⭐">جيد جدا ⭐</option><option value="جيد 👍">جيد 👍</option><option value="مقبول 🔸">مقبول 🔸</option></select></div>
        <input class="inp num error-inp" type="number" placeholder="عدد الأخطاء">
    </div>`;
}

function addSurah(containerId, prefix, isNew) {
  counters[prefix]++; var idx=counters[prefix];
  var div=document.createElement('div'); div.className='surah-row'; div.id='row-'+prefix+idx;
  var extra = isNew ? '<div style="grid-column:1/-1; margin-top:5px;"><input class="inp next-plan" placeholder="ما سيتم حفظه القادم..."></div>' : getEvaluationHtml();
  div.innerHTML=(idx>1?'<button class="del-btn" onclick="this.parentElement.remove()">✕</button>':'')+
    '<div class="ac-wrap"><input class="inp" id="sr-'+prefix+idx+'" placeholder="اسم السورة..."><div class="ac-drop" id="drop-'+prefix+idx+'"></div></div>'+
    '<div class="sel-wrap"><select class="inp" onchange="this.nextElementSibling.classList.toggle(\'hidden\', this.value!=\'range\')"><option value="full">كاملةً</option><option value="range">من/إلى</option></select></div>'+
    '<div class="range-row hidden" style="grid-column: 1 / -1;"><input class="inp num" type="number" placeholder="من آية"><input class="inp num" type="number" placeholder="إلى آية"></div>'+
    extra;
  document.getElementById(containerId).appendChild(div);
  setupAC(div.querySelector('input'), div.querySelector('.ac-drop'));
}

function addGeneric(containerId, prefix) {
  counters[prefix]++; var idx=counters[prefix];
  var div=document.createElement('div'); div.className='q-row'; div.id='row-'+prefix+idx;
  div.innerHTML=(idx>1?'<button class="del-btn" onclick="this.parentElement.remove()">✕</button>':'')+
    '<input class="inp num" placeholder="من">'+
    '<input class="inp num" placeholder="إلى">'+
    getEvaluationHtml();
  document.getElementById(containerId).appendChild(div);
}

function setupAC(inp, drop) {
  inp.addEventListener('input',function(){
    var val=inp.value;
    if(!val.trim()){drop.style.display='none';return;}
    var matches=SURAS_PLAIN.filter(s=>s.includes(val)).slice(0,5);
    drop.innerHTML=matches.map(m=>'<div class="ac-item" onclick="this.parentElement.parentElement.parentElement.querySelector(\'input\').value=\''+m+'\'; this.parentElement.style.display=\'none\';">'+m+'</div>').join('');
    drop.style.display='block';
  });
}

function saveData(){
  var nm=document.getElementById('inp-student').value;
  if(!nm){alert('يرجى كتابة اسم الطالب'); return;}
  alert('تم حفظ البيانات بنجاح (يمكنك برمجة وظيفة الطباعة هنا).');
}
</script>
</body>
</html>
