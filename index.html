<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة خادم القرآن الكريم الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #c5a059;
            --bg-dark: #050505;
            --surface: #111111;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #f8f9fa;
            --text-muted: #a0a0a0;
            --accent: #1db954;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            padding: 100px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1a160d 0%, #050505 70%);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            background: linear-gradient(to bottom, #fff, #c5a059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Card System */
        .container {
            max-width: 1100px;
            margin: -50px auto 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(197, 160, 89, 0.1);
        }

        .card i { font-size: 2rem; color: var(--primary); margin-bottom: 20px; }
        
        .card h3 { font-size: 1.5rem; margin-bottom: 10px; }
        
        .btn-custom {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-custom:hover {
            background: var(--primary);
            color: #000;
        }

        /* Modal */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .modal-box {
            background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid var(--primary);
            text-align: center;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>مَرْكَزُ خَادِمِ القُرْآنِ</h1>
        <p style="color: var(--text-muted);">بوابة رقمية إسلامية متكاملة</p>
    </section>

    <main class="container">
        <div class="card">
            <i class="fa-solid fa-book-open"></i>
            <h3>السراج المنير</h3>
            <p>موسوعة فقهية شاملة بأسلوب مبسط وعصري.</p>
            <button class="btn-custom" onclick="location.href='#'">ابدأ التصفح</button>
        </div>

        <div class="card">
            <i class="fa-solid fa-shield-halved" style="color: #ff4757;"></i>
            <h3>نظام المتابعة</h3>
            <p>مساحة خاصة للمشرفين والطلاب (مقفلة).</p>
            <button class="btn-custom" onclick="document.getElementById('modal').style.display='flex'">دخول آمن</button>
        </div>
        <!-- يمكنك تكرار الكاردات هنا -->
    </main>

    <div id="modal">
        <div class="modal-box">
            <h3>رمز المرور</h3>
            <input type="password" id="pass" style="padding: 10px; border-radius: 5px; margin: 10px 0;">
            <br>
            <button class="btn-custom" onclick="check()">تحقق</button>
        </div>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value == '7222') location.href = 'index1.html';
            else alert('رمز خاطئ');
        }
    </script>
</body>
</html>
