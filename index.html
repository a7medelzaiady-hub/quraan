<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مركز خادم القرآن - متابعة الحفظ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700&family=Amiri:wght=400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --green-deep:#0b1e14;
  --green-mid:#133020;
  --green-light:#1c422c;
  --gold:#d4af53;
  --gold-light:#ebd084;
  --white:#ffffff;
  --cream:#f9f5ee;
  --border:#dde8e0;
  --text:#1a1a1a;
  --sub:#5a6b61;
  --red:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{direction:rtl;font-family:'Cairo',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden}

.hdr{background:linear-gradient(160deg,var(--green-deep) 0%,var(--green-mid) 100%);padding:20px 16px 24px;text-align:center;position:relative}
.hdr-emblem{width:56px;height:56px;margin:0 auto 10px;background:rgba(212,175,83,.15);border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px}
.hdr-title{color:var(--white);font-family:'Amiri',serif;font-size:22px;font-weight:700}
.hdr-subtitle{color:var(--gold-light);font-size:13px;font-weight:600;margin-top:6px}

.body{padding:14px 14px 100px}
.section{background:var(--white);border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-head{background:var(--green-mid);padding:11px 14px;border-radius:14px 14px 0 0}
.sec-head-title{color:var(--white);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-head-title i{color:var(--gold-light);font-size:16px}
.sec-body{padding:12px}

.flbl{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.frow{margin-bottom:9px}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafcfa;outline:none}
.inp.num{text-align:center;font-size:14px;font-weight:700}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--green-mid);font-size:12px;pointer-events:none}
select.inp{padding-left:28px;cursor:pointer}

.ac-wrap{position:relative}
.ac-drop{display:none;position:absolute;top:calc(100% + 4px);right:0;left:0;background:var(--white);border:1.5px solid var(--green-mid);border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:200px;overflow-y:auto}
.ac-item{padding:9px 13px;font-size:13px;font-family:'Amiri',serif;cursor:pointer;border-bottom:.5px solid #eef4f0}

.surah-row, .q-row{display:grid;grid-template-columns:1fr 130px;gap:8px;margin-bottom:8px;background:var(--cream);border-radius:10px;padding:9px;border:1px solid var(--border);position:relative}
.q-row{grid-template-columns:1fr 1fr}
.del-btn{position:absolute;left:-6px;top:-6px;width:22px;height:22px;border-radius:50%;background:var(--white);border:1.5px solid #fca5a5;color:var(--red);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.range-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)}
.range-row.hidden{display:none}

.add-btn{width:100%;padding:8px;margin-top:2px;border:1.5px dashed var(--green-mid);border-radius:9px;background:transparent;color:var(--green-mid);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

.submit-wrap{position:fixed;bottom:0;right:0;left:0;background:var(--white);padding:12px 14px;border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:200}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green-mid),var(--green-light));color:var(--gold-light);border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}

.render-container { position: absolute; top: -9999px; left: 0; width: 480px; }
.rep-card { background-color: #0d2116; padding: 25px; color:#fff; font-family: 'Cairo', sans-serif; }
.rep-section { margin-bottom: 15px; }
.rep-sec-title { color: #d4af53; font-weight: 700; margin-bottom: 8px; border-bottom: 1px solid #1f422e; padding-bottom: 5px; }
.rep-item { background: #153020; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
.rep-extra-info { font-size: 12px; color: #ebd084; margin-top: 5px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-emblem">🕌</div>
  <div class="hdr-title">مركز خادم القرآن الكريم</div>
  <div class="hdr-subtitle">تحت إشراف الشيخ عبدالرحمن</div>
</div>

<div class="body">
  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-user"></i>بيانات البطل</div></div>
    <div class="sec-body">
      <div class="frow">
        <div class="flbl">اسم البطل</div>
        <input class="inp" id="inp-student" placeholder="أدخل اسم البطل...">
        <button onclick="loadStudentData()" class="add-btn" style="margin-top:10px"><i class="ti ti-photo"></i> استرجاع التقرير السابق</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-book"></i>السور الجديدة</div></div>
    <div class="sec-body"><div id="new-surahs"></div><button class="add-btn" onclick="addSurah('new-surahs','ns',true,true)"><i class="ti ti-plus"></i> إضافة سورة</button></div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-books"></i>ماضي السور</div></div>
    <div class="sec-body"><div id="past-surahs"></div><button class="add-btn" onclick="addSurah('past-surahs','ps',true,false)"><i class="ti ti-plus"></i> إضافة سورة</button></div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-pencil"></i>أسئلة المذكرة الجديدة</div></div>
    <div class="sec-body"><div id="mur-questions"></div><button class="add-btn" onclick="addQuestion('mur-questions','mq',true,true)"><i class="ti ti-plus"></i> إضافة أسئلة</button></div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-history"></i>ماضي المذكرة</div></div>
    <div class="sec-body"><div id="past-mur"></div><button class="add-btn" onclick="addQuestion('past-mur','pm',true,false)"><i class="ti ti-plus"></i> إضافة أسئلة</button></div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-bulb"></i>السراج</div></div>
    <div class="sec-body"><div id="suraj-section"></div><button class="add-btn" onclick="addQuestion('suraj-section','sj',true,false)"><i class="ti ti-plus"></i> إضافة سؤال</button></div>
  </div>

  <div class="section">
    <div class="sec-head"><div class="sec-head-title"><i class="ti ti-feather"></i>الحديث والأذكار</div></div>
    <div class="sec-body"><div id="hadith-section"></div><button class="add-btn" onclick="addSurah('hadith-section','hd',true,false)"><i class="ti ti-plus"></i> إضافة حديث / ذكر</button></div>
  </div>
</div>

<div class="submit-wrap">
  <button class="submit-btn" onclick="generateAndShare()">إنشاء ومشاركة التقرير</button>
</div>

<div class="render-container" id="capture-zone"></div>

<script>
var SURAS_PLAIN=['الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس','هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه','الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم','لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر','فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق','الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة','الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج','نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس','التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد','الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات','القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر','المسد','الإخلاص','الفلق','الناس'];
var counters={ns:0,ps:0,mq:0,pm:0,sj:0,hd:0};

function getExtraForNewSurah(includeNextPlan, label) {
    var nextPlanHtml = includeNextPlan ? `<input class="inp next-plan" placeholder="ما سيتم حفظه القادم...">` : '';
    return `<div style="grid-column: 1 / -1; margin-top:5px; padding-top:5px; border-top:1px dashed #ccc;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:5px;">
            <div class="sel-wrap"><select class="inp rating-sel"><option value="">تقييم ${label}</option><option value="ممتاز 🌟">ممتاز 🌟</option><option value="جيد جداً ⭐">جيد جداً ⭐</option><option value="جيد 👍">جيد 👍</option><option value="يحتاج مراجعة 📖">يحتاج مراجعة 📖</option></select></div>
            <input class="inp num error-inp" type="number" placeholder="عدد الأخطاء">
        </div>
        ${nextPlanHtml}
    </div>`;
}

function getExtraForNewMur(includeNextPlan, label) {
    var nextPlanHtml = includeNextPlan ? `<input class="inp next-plan" placeholder="ما سيتم حفظه القادم...">` : '';
    return `<div style="grid-column: 1 / -1; margin-top:5px; padding-top:5px; border-top:1px dashed #ccc;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:5px;">
            <div class="sel-wrap"><select class="inp rating-sel"><option value="">تقييم ${label}</option><option value="ممتاز 🌟">ممتاز 🌟</option><option value="جيد جداً ⭐">جيد جداً ⭐</option><option value="جيد 👍">جيد 👍</option><option value="يحتاج مراجعة 📖">يحتاج مراجعة 📖</option></select></div>
            <input class="inp num error-inp" type="number" placeholder="عدد الأخطاء">
        </div>
        ${nextPlanHtml}
    </div>`;
}

function addSurah(containerId,prefix,withExtra,includeNextPlan){
  counters[prefix]++; var idx=counters[prefix];
  var div=document.createElement('div'); div.className='surah-row'; div.id='row-'+prefix+idx;
  var label = (prefix === 'ns') ? 'السورة' : (prefix === 'ps' ? 'الماضي' : 'القسم');
  var extraHtml = withExtra ? getExtraForNewSurah(includeNextPlan, label) : '';
  div.innerHTML=(idx>1?'<button class="del-btn" onclick="delRow(\'row-'+prefix+idx+'\')">✕</button>':'')+
    '<div class="ac-wrap"><input class="inp" id="sr-'+prefix+idx+'" placeholder="اسم السورة..."><div class="ac-drop" id="drop-'+prefix+idx+'"></div></div>'+
    '<div class="sel-wrap"><select class="inp" id="sel-'+prefix+idx+'" onchange="toggleRange(\'rng-'+prefix+idx+'\',this.value)"><option value="full">كاملةً</option><option value="range">من/إلى</option></select></div>'+
    '<div class="range-row hidden" id="rng-'+prefix+idx+'" style="grid-column: 1 / -1;"><div class="frow"><input class="inp num" id="f-'+prefix+idx+'" type="number" placeholder="من آية"></div><div class="frow"><input class="inp num" id="t-'+prefix+idx+'" type="number" placeholder="إلى آية"></div></div>' + extraHtml;
  document.getElementById(containerId).appendChild(div);
  setupAC(document.getElementById('sr-'+prefix+idx), document.getElementById('drop-'+prefix+idx));
}

function addQuestion(containerId,prefix,withExtra,includeNextPlan){
  counters[prefix]++; var idx=counters[prefix];
  var div=document.createElement('div'); div.className='q-row'; div.id='qrow-'+prefix+idx;
  var label = (prefix === 'mq') ? 'المذكرة' : (prefix === 'pm' ? 'الماضي' : 'السراج');
  var extraHtml = withExtra ? getExtraForNewMur(includeNextPlan, label) : '';
  div.innerHTML=(idx>1?'<button class="del-btn" onclick="delRow(\'qrow-'+prefix+idx+'\')">✕</button>':'')+
    '<div class="frow"><input class="inp num" id="qf-'+prefix+idx+'" type="number" placeholder="من س"></div>'+
    '<div class="frow"><input class="inp num" id="qt-'+prefix+idx+'" type="number" placeholder="إلى س"></div>' + extraHtml;
  document.getElementById(containerId).appendChild(div);
}

function setupAC(inp,drop){
  inp.addEventListener('input',function(){
    var val=inp.value;
    if(!val.trim()){drop.style.display='none';return;}
    var matches=SURAS_PLAIN.filter(s=>s.includes(val)).slice(0,5);
    if(!matches.length){drop.style.display='none';return;}
    drop.innerHTML=matches.map(m=>'<div class="ac-item" onclick="pickAC(\''+inp.id+'\',\''+drop.id+'\',\''+m+'\')">'+m+'</div>').join('');
    drop.style.display='block';
  });
}
function pickAC(inpId,dropId,name){document.getElementById(inpId).value=name;document.getElementById(dropId).style.display='none';}
function delRow(id){document.getElementById(id).remove();}
function toggleRange(rngId,val){document.getElementById(rngId).classList.toggle('hidden',val!=='range');}

function collectData(containerId, isQ) {
  var res=[];
  document.querySelectorAll('#'+containerId+' > div').forEach(row=>{
    var item={
        nextPlan: row.querySelector('.next-plan')?.value || '',
        rating: row.querySelector('.rating-sel')?.value || '',
        errors: row.querySelector('.error-inp')?.value || ''
    };
    if(!isQ){
        item.sr = row.querySelector('input[id^="sr-"]')?.value;
        item.type = row.querySelector('select')?.value;
        item.f = row.querySelector('input[id^="f-"]')?.value;
        item.t = row.querySelector('input[id^="t-"]')?.value;
    } else {
        item.f = row.querySelector('input[id^="qf-"]')?.value;
        item.t = row.querySelector('input[id^="qt-"]')?.value;
    }
    if(item.sr || item.f) res.push(item);
  });
  return res;
}

function buildReportHTML(nm, data) {
    var html = `<div class="rep-card">
        <div style="text-align:center; margin-bottom:15px;">
            <div style="font-size:28px;">🕌</div>
            <div style="font-family:'Amiri',serif; font-size:20px; color:#d4af53;">مركز خادم القرآن الكريم</div>
            <div style="font-size:12px; color:#ebd084;">تحت إشراف الشيخ عبدالرحمن</div>
        </div>
        <div style="text-align:center; margin-bottom:12px; background:#153020; padding:8px; border-radius:8px;">
            <span style="color:#ebd084; font-weight:700;">البطل: </span><span style="color:#fff; font-weight:700;">${nm}</span>
        </div>`;

    if(data.ns.length) {
        html += `<div class="rep-section"><div class="rep-sec-title">📖 السور الجديدة</div>`;
        data.ns.forEach(function(item) {
            var txt = item.sr + (item.type==='range' ? ' ('+item.f+' - '+item.t+')' : ' كاملة');
            html += `<div class="rep-item">${txt}`;
            if(item.rating || item.errors) {
                html += `<div class="rep-extra-info">`;
                if(item.rating) html += `<span>${item.rating}</span>`;
                if(item.errors) html += `<span>أخطاء: ${item.errors}</span>`;
                html += `</div>`;
            }
            if(item.nextPlan) html += `<div style="font-size:11px; color:#8ab89a; margin-top:3px;">القادم: ${item.nextPlan}</div>`;
            html += `</div>`;
        });
        html += `</div>`;
    }

    if(data.ps.length) {
        html += `<div class="rep-section"><div class="rep-sec-title">📚 ماضي السور</div>`;
        data.ps.forEach(function(item) {
            var txt = item.sr + (item.type==='range' ? ' ('+item.f+' - '+item.t+')' : ' كاملة');
            html += `<div class="rep-item">${txt}`;
            if(item.rating || item.errors) {
                html += `<div class="rep-extra-info">`;
                if(item.rating) html += `<span>${item.rating}</span>`;
                if(item.errors) html += `<span>أخطاء: ${item.errors}</span>`;
                html += `</div>`;
            }
            html += `</div>`;
        });
        html += `</div>`;
    }

    if(data.mq.length) {
        html += `<div class="rep-section"><div class="rep-sec-title">✏️ أسئلة المذكرة الجديدة</div>`;
        data.mq.forEach(function(item) {
            html += `<div class="rep-item">من س${item.f} إلى س${item.t}`;
            if(item.rating || item.errors) {
                html += `<div class="rep-extra-info">`;
                if(item.rating) html += `<span>${item.rating}</span>`;
                if(item.errors) html += `<span>أخطاء: ${item.errors}</span>`;
                html += `</div>`;
            }
            if(item.nextPlan) html += `<div style="font-size:11px; color:#8ab89a; margin-top:3px;">القادم: ${item.nextPlan}</div>`;
            html += `</div>`;
        });
        html += `</div>`;
    }

    if(data.pm.length) {
        html += `<div class="rep-section"><div class="rep-sec-title">📋 ماضي المذكرة</div>`;
        data.pm.forEach(function(item) {
            html += `<div class="rep-item">من س${item.f} إلى س${item.t}`;
            if(item.rating || item.errors) {
                html += `<div class="rep-extra-info">`;
                if(item.rating) html += `<span>${item.rating}</span>`;
                if(item.errors) html += `<span>أخطاء: ${item.errors}</span>`;
                html += `</div>`;
            }
            html += `</div>`;
        });
        html += `</div>`;
    }

    if(data.sj && data.sj.length) {
        html += `<div class="rep-section"><div class="rep-sec-title">💡 السراج</div>`;
        data.sj.forEach(function(item) {
            html += `<div class="rep-item">من س${item.f} إلى س${item.t}`;
            if(item.rating || item.errors) {
                html += `<div class="rep-extra-info">`;
                if(item.rating) html += `<span>${item.rating}</span>`;
                if(item.errors) html += `<span>أخطاء: ${item.errors}</span>`;
                html += `</div>`;
            }
            html += `</div>`;
        });
        html += `</div>`;
    }

    if(data.hd && data.hd.length) {
        html += `<div class="rep-section"><div class="rep-sec-title">📿 الحديث والأذكار</div>`;
        data.hd.forEach(function(item) {
            var txt = item.sr + (item.type==='range' ? ' ('+item.f+' - '+item.t+')' : ' كاملة');
            html += `<div class="rep-item">${txt}`;
            if(item.rating || item.errors) {
                html += `<div class="rep-extra-info">`;
                if(item.rating) html += `<span>${item.rating}</span>`;
                if(item.errors) html += `<span>أخطاء: ${item.errors}</span>`;
                html += `</div>`;
            }
            html += `</div>`;
        });
        html += `</div>`;
    }

    html += `</div>`;
    return html;
}

function showImageModal(imgSrc) {
    var modal = document.createElement('div');
    modal.id = 'img-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px;overflow-y:auto;';
    modal.innerHTML = '<img src="'+imgSrc+'" style="max-width:100%;max-height:78vh;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);margin-bottom:16px;">'
        + '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">'
        + '<button id="modal-close-btn" style="padding:10px 28px;background:#d4af53;color:#0b1e14;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;">إغلاق</button>'
        + '<button id="modal-save-btn" style="padding:10px 28px;background:#1c422c;color:#ebd084;border:1.5px solid #d4af53;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;">حفظ الصورة</button>'
        + '</div>';
    document.body.appendChild(modal);
    document.getElementById('modal-close-btn').addEventListener('click', function(){ modal.remove(); });
    document.getElementById('modal-save-btn').addEventListener('click', function(){
        var a = document.createElement('a');
        a.href = imgSrc;
        a.download = 'تقرير_' + document.getElementById('inp-student').value.trim() + '.png';
        a.click();
    });
    modal.addEventListener('click', function(e){ if(e.target === modal) modal.remove(); });
}

async function generateAndShare(){
  var nm=document.getElementById('inp-student').value.trim();
  if(!nm){alert('يرجى إدخال اسم البطل'); return;}

  var data = {
    ns: collectData('new-surahs', false), ps: collectData('past-surahs', false),
    mq: collectData('mur-questions', true), pm: collectData('past-mur', true),
    sj: collectData('suraj-section', true), hd: collectData('hadith-section', false)
  };

  var zone = document.getElementById('capture-zone');
  zone.innerHTML = buildReportHTML(nm, data);

  try {
    var canvas = await html2canvas(zone.firstElementChild, {scale: 2, useCORS: true, backgroundColor: '#0d2116'});
    var imgData = canvas.toDataURL('image/png');

    localStorage.setItem('rep_img_' + nm, imgData);
    localStorage.setItem('rep_' + nm, JSON.stringify(data));

    if(navigator.share && navigator.canShare) {
      try {
        var blob = await (await fetch(imgData)).blob();
        var file = new File([blob], 'تقرير_' + nm + '.png', {type: 'image/png'});
        if(navigator.canShare({files: [file]})) {
          await navigator.share({files: [file], title: 'تقرير ' + nm});
          return;
        }
      } catch(e) {}
    }

    showImageModal(imgData);

  } catch(e) {
    alert('حدث خطأ في إنشاء التقرير: ' + e.message);
  }
}

function loadStudentData() {
  var nm = document.getElementById('inp-student').value.trim();
  if(!nm){alert('يرجى إدخال اسم البطل أولاً'); return;}
  var imgData = localStorage.getItem('rep_img_' + nm);
  if (!imgData) { alert('لا يوجد تقرير سابق لهذا البطل'); return; }
  showImageModal(imgData);
}

addQuestion('suraj-section','sj',true,false);
addSurah('hadith-section','hd',true,false);
