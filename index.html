<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مركز خادم القرآن - متابعة الحفظ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --green-deep:#0b1e14;
  --green-mid:#133020;
  --green-light:#1c422c;
  --gold:#d4af53;
  --gold-light:#ebd084;
  --white:#ffffff;
  --cream:#f9f5ee;
  --border:#dde8e0;
  --text:#1a1a1a;
  --sub:#5a6b61;
  --red:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{direction:rtl;font-family:'Cairo',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden}

/* ══ HEADER ══ */
.hdr{
  background:linear-gradient(160deg,var(--green-deep) 0%,var(--green-mid) 100%);
  padding:20px 16px 24px;text-align:center;position:relative;
}
.hdr-emblem{
  width:56px;height:56px;margin:0 auto 10px;
  background:rgba(212,175,83,.15);border:1.5px solid var(--gold);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;
}
.hdr-center{color:var(--gold-light);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.hdr-title{color:var(--white);font-family:'Amiri',serif;font-size:22px;font-weight:700;}
.hdr-subtitle{color:var(--gold-light);font-size:13px;font-weight:600;margin-top:6px;}

/* ══ FORM BODY ══ */
.body{padding:14px 14px 100px}

/* ══ SECTION ══ */
.section{background:var(--white);border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-head{
  background:var(--green-mid);
  padding:11px 14px;border-radius:14px 14px 0 0;
}
.sec-head-title{color:var(--white);font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-head-title i{color:var(--gold-light);font-size:16px}
.sec-body{padding:12px}

/* ══ FIELDS ══ */
.flbl{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.frow{margin-bottom:9px}
.inp{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:9px;
  font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);
  background:#fafcfa;outline:none;
}
.inp:focus{border-color:var(--green-mid);}
.inp.num{text-align:center;font-size:14px;font-weight:700;}

/* select styled */
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--green-mid);font-size:12px;pointer-events:none}
select.inp{padding-left:28px;cursor:pointer;background-color:#fafcfa}

/* ══ AUTOCOMPLETE ══ */
.ac-wrap{position:relative}
.ac-drop{
  display:none;position:absolute;top:calc(100% + 4px);right:0;left:0;
  background:var(--white);border:1.5px solid var(--green-mid);border-radius:10px;
  overflow:hidden;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:200px;overflow-y:auto;
}
.ac-item{
  padding:9px 13px;font-size:13px;font-family:'Amiri',serif;
  cursor:pointer;border-bottom:.5px solid #eef4f0;
}

/* ══ DYNAMIC ROWS ══ */
.surah-row, .q-row{
  display:grid;grid-template-columns:1fr 130px;gap:8px;
  margin-bottom:8px;background:var(--cream);border-radius:10px;padding:9px;
  border:1px solid var(--border);position:relative;
}
.q-row{grid-template-columns:1fr 1fr;}
.del-btn{
  position:absolute;left:-6px;top:-6px;
  width:22px;height:22px;border-radius:50%;
  background:var(--white);border:1.5px solid #fca5a5;color:var(--red);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.range-row{
  display:grid;grid-template-columns:1fr 1fr;gap:7px;
  margin-top:7px;padding-top:7px;border-top:1px dashed var(--border);
}
.range-row.hidden{display:none}

.add-btn{
  width:100%;padding:8px;margin-top:2px;
  border:1.5px dashed var(--green-mid);border-radius:9px;
  background:transparent;color:var(--green-mid);font-size:12px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
}

/* ══ SUBMIT ══ */
.submit-wrap{
  position:fixed;bottom:0;right:0;left:0;
  background:var(--white);padding:12px 14px;
  border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.08);
  z-index:200;
}
.submit-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--green-mid),var(--green-light));
  color:var(--gold-light);border:none;border-radius:11px;
  font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--green-deep);color:var(--gold-light);
  padding:10px 20px;border-radius:20px;font-size:12px;font-family:'Cairo',sans-serif;
  display:none;z-index:999;white-space:nowrap;
}

/* ══ REPORT CARD DESIGN ══ */
.render-container { position: absolute; top: -9999px; left: 0; width: 480px; z-index: -100; }
.rep-card { background-color: #0d2116; padding: 30px; position: relative; width: 100%; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
.rep-border-outer { position: absolute; inset: 12px; border: 1px solid #1f422e; border-radius: 8px; pointer-events: none; }
.rep-border-inner { position: absolute; inset: 16px; border: 1px dashed rgba(212, 175, 83, 0.4); border-radius: 6px; pointer-events: none; }
.rep-header { text-align: center; margin-bottom: 24px; position: relative; z-index: 2; }
.rep-bismillah { color: #ebd084; font-family: 'Amiri', serif; font-size: 20px; font-weight: bold; margin-bottom: 16px; }
.rep-logo-circle { width: 50px; height: 50px; margin: 0 auto 10px; background: rgba(212, 175, 83, 0.1); border: 2px solid #d4af53; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.rep-center-title { color: #ebd084; font-size: 18px; font-weight: 700; font-family: 'Amiri', serif; }
.rep-sheikh-name { color: #ebd084; font-size: 14px; font-weight: bold; margin-top: 6px; }
.rep-divider { width: 80%; height: 1px; background: rgba(255,255,255,0.1); margin: 16px auto; }
.rep-student-box { background-color: #1a3625; border: 1px solid #234731; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 24px; position: relative; z-index: 2; }
.rep-st-name { color: #ffffff; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.rep-st-date { color: #7f9588; font-size: 12px; font-weight: 600; }
.rep-section { margin-bottom: 20px; position: relative; z-index: 2; }
.rep-sec-title { color: #d4af53; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.rep-item { display: flex; justify-content: space-between; align-items: center; background-color: #153020; padding: 14px 16px; border-radius: 8px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.03); }
.rep-item-name { color: #ffffff; font-size: 14px; font-weight: 600; font-family: 'Cairo', sans-serif;}
.rep-item-val { color: #d4af53; font-size: 13px; font-weight: 700; }
.rep-rating-box { background: linear-gradient(90deg, #153020, #1a3625); border: 1px solid rgba(212, 175, 83, 0.3); border-radius: 10px; padding: 14px; text-align: center; margin-top: 24px; position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; gap: 10px; }
.rep-rating-lbl { color: #ffffff; font-size: 15px; font-weight: 700; }
.rep-rating-val { color: #d4af53; font-size: 16px; font-weight: 700; }
.rep-footer { text-align: center; margin-top: 30px; position: relative; z-index: 2; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-emblem">🕌</div>
  <div class="hdr-center">مركز</div>
  <div class="hdr-title">خادم القرآن الكريم</div>
  <div class="hdr-subtitle">تحت إشراف الشيخ عبدالرحمن</div>
</div>

<div class="body">
  <!-- بيانات البطل والتقييم -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-title"><i class="ti ti-user"></i>بيانات البطل والتقييم</div>
    </div>
    <div class="sec-body">
      <div class="frow" style="display:flex; gap:8px;">
        <div style="flex-grow:1">
          <div class="flbl">اسم البطل</div>
          <input class="inp" id="inp-student" placeholder="أدخل اسم البطل...">
        </div>
        <button onclick="loadStudentData()" class="add-btn" style="width:auto; margin-top:22px; padding:0 15px; border:1.5px solid var(--green-mid)">استرجاع</button>
      </div>
      <div class="frow">
        <div class="flbl">التقييم العام</div>
        <div class="sel-wrap">
          <select class="inp" id="inp-rating">
            <option value="بارك الله فيك">بارك الله فيك 🌟</option>
            <option value="جيد جداً">جيد جدا ⭐</option>
            <option value="جيد">جيد 👍</option>
            <option value="مقبول">مقبول 🔸</option>
            <option value="يحتاج لمراجعة">يحتاج لمراجعة 📖</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- السور الجديدة -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-title"><i class="ti ti-book"></i>السور الجديدة</div>
    </div>
    <div class="sec-body">
      <div id="new-surahs"></div>
      <button class="add-btn" onclick="addSurah('new-surahs','ns')"><i class="ti ti-plus"></i> إضافة سورة</button>
    </div>
  </div>

  <!-- ماضي السور -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-title"><i class="ti ti-books"></i>ماضي السور</div>
    </div>
    <div class="sec-body">
      <div id="past-surahs"></div>
      <button class="add-btn" onclick="addSurah('past-surahs','ps')"><i class="ti ti-plus"></i> إضافة سورة</button>
    </div>
  </div>

  <!-- أسئلة المذكرة -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-title"><i class="ti ti-pencil"></i>أسئلة المذكرة</div>
    </div>
    <div class="sec-body">
      <div id="mur-questions"></div>
      <button class="add-btn" onclick="addQuestion('mur-questions','mq')"><i class="ti ti-plus"></i> إضافة أسئلة</button>
    </div>
  </div>

  <!-- ماضي المذكرة -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-title"><i class="ti ti-history"></i>ماضي المذكرة</div>
    </div>
    <div class="sec-body">
      <div id="past-mur"></div>
      <button class="add-btn" onclick="addQuestion('past-mur','pm')"><i class="ti ti-plus"></i> إضافة أسئلة</button>
    </div>
  </div>
</div>

<div class="submit-wrap">
  <button class="submit-btn" onclick="generateAndShare()">
    <i class="ti ti-share" style="font-size:18px"></i> إنشاء ومشاركة التقرير
  </button>
</div>

<!-- منطقة رسم التقرير الخفية -->
<div class="render-container">
  <div class="rep-card" id="capture-zone">
    <div class="rep-border-outer"></div>
    <div class="rep-border-inner"></div>
    
    <div class="rep-header">
      <div class="rep-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      <div class="rep-logo-circle">🕌</div>
      <div class="rep-center-title">مركز خادم القرآن الكريم</div>
      <div class="rep-sheikh-name">تحت إشراف الشيخ عبدالرحمن</div>
      <div class="rep-divider"></div>
    </div>

    <div class="rep-student-box">
      <div class="rep-st-name" id="rep-name">البطل: —</div>
      <div class="rep-st-date" id="rep-date-val"></div>
    </div>
    
    <div id="rep-sections-container"></div>
    
    <!-- التقييم -->
    <div class="rep-rating-box" id="rep-rating-container" style="display:none;">
      <span class="rep-rating-lbl">التقييم العام:</span>
      <span class="rep-rating-val" id="rep-rating-val"></span>
    </div>

    <div class="rep-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SURAS_PLAIN=['الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس','هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه','الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم','لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر','فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق','الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة','الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج','نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس','التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد','الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات','القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر','المسد','الإخلاص','الفلق','الناس'];
var counters={ns:0,ps:0,mq:0,pm:0};

function norm(s){return s.replace(/[\u064B-\u065F]/g,'').replace(/[أإآ]/g,'ا').replace(/ة/g,'ه');}

function setupAC(inp,drop){
  inp.addEventListener('input',function(){
    var val=inp.value;
    if(!val.trim()){drop.style.display='none';return;}
    var q=norm(val);
    var matches=SURAS_PLAIN.filter(s=>norm(s).includes(q)).slice(0,6);
    if(!matches.length){drop.style.display='none';return;}
    drop.innerHTML=matches.map(m=>'<div class="ac-item" onclick="pickAC(\''+inp.id+'\',\''+drop.id+'\',\''+m+'\')">'+m+'</div>').join('');
    drop.style.display='block';
  });
}
function pickAC(inpId,dropId,name){
  document.getElementById(inpId).value=name;
  document.getElementById(dropId).style.display='none';
}

function addSurah(containerId,prefix){
  counters[prefix]++; var idx=counters[prefix];
  var div=document.createElement('div'); div.className='surah-row'; div.id='row-'+prefix+idx;
  
  var extraHtml = '';
  if(prefix === 'ps') { 
    extraHtml = '<div style="grid-column: 1 / -1; display:grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 4px; padding-top: 6px; border-top: 1px dashed var(--border);">' +
                '<div class="sel-wrap"><select class="inp rating-sel"><option value="">- التقييم -</option><option value="بارك الله فيك 🌟">بارك الله فيك 🌟</option><option value="جيد جدا ⭐">جيد جدا ⭐</option><option value="جيد 👍">جيد 👍</option><option value="مقبول 🔸">مقبول 🔸</option><option value="يحتاج لمراجعة 📖">يحتاج لمراجعة 📖</option></select></div>' +
                '<div><input class="inp num error-inp" type="number" placeholder="عدد الأخطاء" min="0"></div>' +
                '</div>';
  }

  div.innerHTML=(idx>1?'<button class="del-btn" onclick="delRow(\'row-'+prefix+idx+'\')">✕</button>':'')+
    '<div class="ac-wrap"><input class="inp" id="sr-'+prefix+idx+'" placeholder="اسم السورة..."><div class="ac-drop" id="drop-'+prefix+idx+'"></div></div>'+
    '<div class="sel-wrap"><select class="inp" id="sel-'+prefix+idx+'" onchange="toggleRange(\'rng-'+prefix+idx+'\',this.value)"><option value="full">كاملةً</option><option value="range">من/إلى</option></select></div>'+
    '<div class="range-row hidden" id="rng-'+prefix+idx+'" style="grid-column: 1 / -1;"><div class="frow"><input class="inp num" id="f-'+prefix+idx+'" type="number" placeholder="من آية"></div><div class="frow"><input class="inp num" id="t-'+prefix+idx+'" type="number" placeholder="إلى آية"></div></div>' + extraHtml;
  document.getElementById(containerId).appendChild(div);
  setupAC(document.getElementById('sr-'+prefix+idx), document.getElementById('drop-'+prefix+idx));
}

function addQuestion(containerId,prefix){
  counters[prefix]++; var idx=counters[prefix];
  var div=document.createElement('div'); div.className='q-row'; div.id='qrow-'+prefix+idx;
  
  var extraHtml = '';
  if(prefix === 'pm') { 
    extraHtml = '<div style="grid-column: 1 / -1; display:grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 4px; padding-top: 6px; border-top: 1px dashed var(--border);">' +
                '<div class="sel-wrap"><select class="inp rating-sel"><option value="">- التقييم -</option><option value="بارك الله فيك 🌟">بارك الله فيك 🌟</option><option value="جيد جدا ⭐">جيد جدا ⭐</option><option value="جيد 👍">جيد 👍</option><option value="مقبول 🔸">مقبول 🔸</option><option value="يحتاج لمراجعة 📖">يحتاج لمراجعة 📖</option></select></div>' +
                '<div><input class="inp num error-inp" type="number" placeholder="عدد الأخطاء" min="0"></div>' +
                '</div>';
  }

  div.innerHTML=(idx>1?'<button class="del-btn" onclick="delRow(\'qrow-'+prefix+idx+'\')">✕</button>':'')+
    '<div class="frow"><div class="flbl">من س</div><input class="inp num" id="qf-'+prefix+idx+'" type="number" placeholder="١"></div>'+
    '<div class="frow"><div class="flbl">إلى س</div><input class="inp num" id="qt-'+prefix+idx+'" type="number" placeholder="١٠"></div>' + extraHtml;
  document.getElementById(containerId).appendChild(div);
}

function delRow(id){var el=document.getElementById(id); if(el) el.remove();}
function toggleRange(rngId,val){document.getElementById(rngId).classList.toggle('hidden',val!=='range');}

function collectSurahs(containerId){
  var res=[];
  document.querySelectorAll('#'+containerId+' .surah-row').forEach(row=>{
    var sr=row.querySelector('input[id^="sr-"]')?.value.trim();
    if(!sr)return;
    var type=row.querySelector('select')?.value||'full';
    var f=row.querySelector('input[id^="f-"]')?.value; 
    var t=row.querySelector('input[id^="t-"]')?.value;
    var rating=row.querySelector('.rating-sel')?.value||'';
    var err=row.querySelector('.error-inp')?.value||'';
    res.push({sr:sr, type:type, from:f, to:t, rating:rating, err:err});
  });
  return res;
}
function collectQuestions(containerId){
  var res=[];
  document.querySelectorAll('#'+containerId+' .q-row').forEach(row=>{
    var f=row.querySelector('input[id^="qf-"]')?.value;
    var t=row.querySelector('input[id^="qt-"]')?.value;
    var rating=row.querySelector('.rating-sel')?.value||'';
    var err=row.querySelector('.error-inp')?.value||'';
    if(f||t) res.push({from:f, to:t, rating:rating, err:err});
  });
  return res;
}

function createVisualSection(icon, title, items, isQ) {
  var html = '<div class="rep-section"><div class="rep-sec-title"><i class="' + icon + '"></i>' + title + '</div>';
  items.forEach(it => {
    var extraRow = '';
    if(it.rating || it.err) {
      extraRow = '<div style="width: 100%; padding-top: 6px; margin-top: 6px; border-top: 1px dashed rgba(255,255,255,0.1); color: #ebd084; font-size: 13px; font-weight: bold; display: flex; justify-content: space-between;">' +
                 '<span>' + (it.rating ? 'التقييم: ' + it.rating : '') + '</span>' +
                 '<span>' + (it.err ? '<span style="color: #ffb3b3;">الأخطاء: ' + it.err + '</span>' : '') + '</span>' +
                 '</div>';
    }
    if(!isQ) {
      var val = (it.type==='full' ? 'كاملةً' : (it.from&&it.to ? 'من آية ' + it.from + ' إلى ' + it.to : 'جزء'));
      html += '<div class="rep-item" style="flex-wrap: wrap;"><div style="display:flex; justify-content:space-between; width:100%; align-items:center;"><div class="rep-item-name">' + it.sr + '</div><div class="rep-item-val">' + val + '</div></div>' + extraRow + '</div>';
    } else {
      html += '<div class="rep-item" style="flex-wrap: wrap;"><div style="display:flex; justify-content:space-between; width:100%; align-items:center;"><div class="rep-item-name">مراجعة الأسئلة</div><div class="rep-item-val">من س ' + it.from + ' إلى س ' + it.to + '</div></div>' + extraRow + '</div>';
    }
  });
  html += '</div>';
  return html;
}

function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}

function generateAndShare(){
  var nm=document.getElementById('inp-student').value.trim();
  if(!nm){showToast('تحذير: أدخل اسم البطل'); return;}
  
  // حفظ البيانات
  localStorage.setItem('rep_' + nm, JSON.stringify({ rating: document.getElementById('inp-rating').value, ns: collectSurahs('new-surahs'), ps: collectSurahs('past-surahs'), mq: collectQuestions('mur-questions'), pm: collectQuestions('past-mur') }));

  showToast('⏳ جاري تجهيز الصورة...');
  
  var opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('rep-name').textContent = "البطل: " + nm;
  document.getElementById('rep-date-val').textContent = new Date().toLocaleDateString('ar-EG', opts);

  var rating = document.getElementById('inp-rating').options[document.getElementById('inp-rating').selectedIndex].text;
  document.getElementById('rep-rating-val').textContent = rating;
  document.getElementById('rep-rating-container').style.display = 'flex';

  var ns=collectSurahs('new-surahs'), ps=collectSurahs('past-surahs');
  var mq=collectQuestions('mur-questions'), pm=collectQuestions('past-mur');
  
  var cont = document.getElementById('rep-sections-container'); cont.innerHTML = "";
  if(ns.length) cont.innerHTML += createVisualSection('ti ti-book', 'السور الجديدة', ns, false);
  if(ps.length) cont.innerHTML += createVisualSection('ti ti-books', 'ماضي السور', ps, false);
  if(mq.length) cont.innerHTML += createVisualSection('ti ti-pencil', 'أسئلة المذكرة', mq, true);
  if(pm.length) cont.innerHTML += createVisualSection('ti ti-history', 'ماضي المذكرة', pm, true);

  setTimeout(function() {
    html2canvas(document.getElementById('capture-zone'), {
      scale: 3, backgroundColor: '#0d2116', windowWidth: 480
    }).then(function(canvas) {
      canvas.toBlob(function(blob) {
        if (!blob) { showToast('❌ فشل إنشاء الصورة'); return; }
        var file = new File([blob], "report.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file] }).catch(e => console.log(e));
        } else {
          var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = 'تقرير.png'; a.click();
          showToast('💾 تم حفظ الصورة بجهازك');
        }
      }, 'image/png');
    });
  }, 200);
}

// دالة استرجاع البيانات
function loadStudentData() {
  var nm = document.getElementById('inp-student').value.trim();
  var data = localStorage.getItem('rep_' + nm);
  if (!data) { showToast('❌ لم يتم العثور على تقرير سابق لهذا البطل'); return; }
  
  var obj = JSON.parse(data);
  document.getElementById('inp-rating').value = obj.rating;
  
  document.getElementById('new-surahs').innerHTML = '';
  document.getElementById('past-surahs').innerHTML = '';
  document.getElementById('mur-questions').innerHTML = '';
  document.getElementById('past-mur').innerHTML = '';
  counters = {ns:0, ps:0, mq:0, pm:0};
  
  obj.ns.forEach(i => { addSurah('new-surahs','ns'); var idx=counters.ns; document.getElementById('sr-ns'+idx).value=i.sr; document.getElementById('sel-ns'+idx).value=i.type; if(i.type==='range'){document.getElementById('rng-ns'+idx).classList.remove('hidden'); document.getElementById('f-ns'+idx).value=i.from; document.getElementById('t-ns'+idx).value=i.to;} });
  obj.ps.forEach(i => { addSurah('past-surahs','ps'); var idx=counters.ps; document.getElementById('sr-ps'+idx).value=i.sr; document.getElementById('sel-ps'+idx).value=i.type; if(i.type==='range'){document.getElementById('rng-ps'+idx).classList.remove('hidden'); document.getElementById('f-ps'+idx).value=i.from; document.getElementById('t-ps'+idx).value=i.to;} document.querySelectorAll('#row-ps'+idx+' .rating-sel')[0].value=i.rating; document.querySelectorAll('#row-ps'+idx+' .error-inp')[0].value=i.err; });
  obj.mq.forEach(i => { addQuestion('mur-questions','mq'); var idx=counters.mq; document.getElementById('qf-mq'+idx).value=i.from; document.getElementById('qt-mq'+idx).value=i.to; });
  obj.pm.forEach(i => { addQuestion('past-mur','pm'); var idx=counters.pm; document.getElementById('qf-pm'+idx).value=i.from; document.getElementById('qt-pm'+idx).value=i.to; document.querySelectorAll('#qrow-pm'+idx+' .rating-sel')[0].value=i.rating; document.querySelectorAll('#qrow-pm'+idx+' .error-inp')[0].value=i.err; });
  
  showToast('✅ تم استرجاع بيانات البطل بنجاح');
}

document.addEventListener('click', e => {
  if(!e.target.closest('.ac-wrap')) document.querySelectorAll('.ac-drop').forEach(d => d.style.display='none');
});

addSurah('new-surahs','ns'); addSurah('past-surahs','ps');
addQuestion('mur-questions','mq'); addQuestion('past-mur','pm');
