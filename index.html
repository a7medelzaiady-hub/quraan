<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مركز خادم القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --gd:#0b1e14;--gm:#133020;--gl:#1c422c;
  --gold:#d4af53;--goldl:#ebd084;
  --cream:#f9f5ee;--border:#dde8e0;--text:#1a1a1a;--sub:#5a6b61;--red:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{direction:rtl;font-family:'Cairo',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden}

/* ── PAGE SYSTEM ── */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* ── HEADER ── */
.hdr{background:linear-gradient(160deg,var(--gd),var(--gm));padding:16px 16px 18px;text-align:center;position:relative}
.hdr-emblem{width:50px;height:50px;margin:0 auto 8px;background:rgba(212,175,83,.15);border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
.hdr-title{color:#fff;font-family:'Amiri',serif;font-size:20px;font-weight:700}
.hdr-sub{color:var(--goldl);font-size:12px;font-weight:600;margin-top:4px}
.hdr-actions{position:absolute;top:14px;left:14px;display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:4px;white-space:nowrap}
.hdr-btn.gold{background:rgba(212,175,83,.25);border-color:var(--gold);color:var(--goldl)}
.hdr-btn.danger{background:rgba(220,38,38,.2);border-color:#fca5a5;color:#fca5a5}

/* ── BODY ── */
.body{padding:14px 14px 110px}

/* ── SECTIONS ── */
.sec{background:#fff;border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sh{background:var(--gm);padding:11px 14px;border-radius:14px 14px 0 0}
.sh-t{color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sh-t i{color:var(--goldl);font-size:16px}
.sb{padding:12px}
.flbl{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.frow{margin-bottom:9px}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafcfa;outline:none}
.inp.num{text-align:center;font-size:14px;font-weight:700}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gm);font-size:12px;pointer-events:none}
select.inp{padding-left:28px;cursor:pointer}
.aw{position:relative}
.ad{display:none;position:absolute;top:calc(100%+4px);right:0;left:0;background:#fff;border:1.5px solid var(--gm);border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:200px;overflow-y:auto}
.ai{padding:9px 13px;font-size:13px;font-family:'Amiri',serif;cursor:pointer;border-bottom:.5px solid #eef4f0}
.sr,.qr{display:grid;grid-template-columns:1fr 130px;gap:8px;margin-bottom:8px;background:var(--cream);border-radius:10px;padding:9px;border:1px solid var(--border);position:relative}
.qr{grid-template-columns:1fr 1fr}
.db{position:absolute;left:-6px;top:-6px;width:22px;height:22px;border-radius:50%;background:#fff;border:1.5px solid #fca5a5;color:var(--red);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rr2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)}
.rr2.hidden{display:none}
.abtn{width:100%;padding:8px;margin-top:2px;border:1.5px dashed var(--gm);border-radius:9px;background:transparent;color:var(--gm);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

/* ── BOTTOM BAR ── */
.bot{position:fixed;bottom:0;right:0;left:0;background:#fff;padding:10px 14px;border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:200;display:flex;gap:8px}
.bot-main{flex:1;padding:13px;background:linear-gradient(135deg,var(--gm),var(--gl));color:var(--goldl);border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.bot-sec{padding:13px 16px;background:#fff;border:2px solid var(--gm);color:var(--gm);border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:5px;white-space:nowrap}

/* ── REPORTS PAGE ── */
#page-reports .hdr{text-align:right;padding-right:16px}
.rep-list{padding:14px 14px 100px}
.rep-card-item{background:#fff;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;border:1px solid var(--border)}
.rep-card-top{display:flex;gap:10px;padding:12px}
.rep-thumb{width:72px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#eee;border:1px solid var(--border)}
.rep-thumb-ph{width:72px;height:90px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--gm),var(--gl));display:flex;align-items:center;justify-content:center;font-size:28px}
.rep-info{flex:1;min-width:0}
.rep-name{font-size:16px;font-weight:900;color:var(--gd);margin-bottom:4px}
.rep-date{font-size:11px;color:var(--sub);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.rep-hijri{font-size:10px;color:#888}
.rep-badge-old{display:inline-flex;align-items:center;gap:4px;background:#fef3c7;border:1px solid #fde68a;color:#92400e;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
.rep-actions{display:flex;gap:6px;padding:0 12px 12px;flex-wrap:wrap}
.ra{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;border:none;display:flex;align-items:center;justify-content:center;gap:4px;min-width:60px}
.ra-view{background:#f0fdf4;color:#15803d;border:1.5px solid #86efac}
.ra-edit{background:#eff6ff;color:#1d4ed8;border:1.5px solid #93c5fd}
.ra-del{background:#fef2f2;color:#dc2626;border:1.5px solid #fca5a5}
.rep-empty{text-align:center;padding:60px 20px;color:var(--sub)}
.rep-empty-ico{font-size:50px;margin-bottom:12px}
.rep-empty-txt{font-size:15px;font-weight:600}

/* ── TOP NAV ── */
.top-nav{display:flex;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tn{flex:1;padding:9px;border-radius:9px;border:2px solid var(--border);background:#fff;color:var(--gm);font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px}
.tn.danger{border-color:#fca5a5;color:#dc2626}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px;overflow-y:auto;gap:14px}
.modal-ov img{max-width:100%;max-height:72vh;border-radius:16px;box-shadow:0 0 60px rgba(52,211,153,.3)}
.modal-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.mb{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Cairo',sans-serif;border:none}
.mb-close{background:#d4af53;color:#030d08}
.mb-save{background:#052e16;color:#34d399;border:2px solid #34d399 !important;border-style:solid}

/* ── SPINNER ── */
.spinner-ov{position:fixed;inset:0;background:rgba(3,13,8,.85);z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:48px;height:48px;border:5px solid rgba(52,211,153,.2);border-top-color:#34d399;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-txt{color:#6ee7b7;font-size:14px;font-weight:700}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9997;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── CONFIRM DIALOG ── */
.conf-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9996;display:flex;align-items:center;justify-content:center;padding:20px}
.conf-box{background:#fff;border-radius:18px;padding:24px;max-width:340px;width:100%;text-align:center}
.conf-ico{font-size:40px;margin-bottom:10px}
.conf-title{font-size:16px;font-weight:900;color:var(--gd);margin-bottom:8px}
.conf-msg{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.6}
.conf-btns{display:flex;gap:10px}
.conf-ok{flex:1;padding:11px;border:none;border-radius:10px;background:#dc2626;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.conf-cancel{flex:1;padding:11px;border:2px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}

/* ── EXPIRY ALERT ── */
.exp-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.exp-ico{font-size:22px;flex-shrink:0}
.exp-txt{font-size:12px;color:#78350f;font-weight:600;line-height:1.5}
.exp-actions{display:flex;gap:6px;margin-top:8px}
.exp-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;border:none}
.exp-save{background:#d97706;color:#fff}
.exp-del{background:#fff;color:#dc2626;border:1.5px solid #fca5a5 !important;border-style:solid}
</style>
</head>
<body>

<!-- ═══ PAGE: MAIN FORM ═══ -->
<div id="page-main" class="page active">
  <div class="hdr">
    <div class="hdr-actions">
      <button class="hdr-btn gold" onclick="goReports()"><i class="ti ti-report"></i> سجل التقارير</button>

<script>
/* ══════════════════════════════════════
   DATABASE — IndexedDB (no quota issues)
══════════════════════════════════════ */
var DB_NAME='QuranCenter',DB_VER=2,db=null;

function openDB(){
  return new Promise(function(res,rej){
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){
      var d=e.target.result;
      if(!d.objectStoreNames.contains('reports')){
        var s=d.createObjectStore('reports',{keyPath:'id',autoIncrement:true});
        s.createIndex('student','student',{unique:false});
        s.createIndex('createdAt','createdAt',{unique:false});
      }
      if(!d.objectStoreNames.contains('draft')){
        d.createObjectStore('draft',{keyPath:'key'});
      }
    };
    req.onsuccess=function(e){db=e.target.result;res(db);};
    req.onerror=function(e){rej(e);};
  });
}

function dbOp(store,mode,fn){
  return new Promise(function(res,rej){
    var tx=db.transaction(store,mode);
    var st=tx.objectStore(store);
    var req=fn(st);
    if(req){req.onsuccess=function(e){res(e.target.result);};req.onerror=function(e){rej(e);};}
    else{tx.oncomplete=function(){res();};tx.onerror=function(e){rej(e);};}
  });
}

function saveReport(nm,data,imgBlob){
  return dbOp('reports','readwrite',function(s){
    return s.add({student:nm,data:data,img:imgBlob,createdAt:Date.now(),hijri:getHijri()});
  });
}
function getAllReports(){
  return new Promise(function(res,rej){
    var tx=db.transaction('reports','readonly');
    var req=tx.objectStore('reports').getAll();
    req.onsuccess=function(e){res(e.target.result);};
    req.onerror=function(e){rej(e);};
  });
}
function getReport(id){
  return dbOp('reports','readonly',function(s){return s.get(id);});
}
function deleteReport(id){
  return dbOp('reports','readwrite',function(s){return s.delete(id);});
}
function deleteAllReports(){
  return dbOp('reports','readwrite',function(s){return s.clear();});
}
function updateReport(rec){
  return dbOp('reports','readwrite',function(s){return s.put(rec);});
}

/* draft persistence */
function saveDraft(){
  if(!db)return;
  var tx=db.transaction('draft','readwrite');
  var st=tx.objectStore('draft');
  st.put({key:'student',val:document.getElementById('inp-student').value});
  st.put({key:'formData',val:collectAll()});
}
function loadDraft(){
  if(!db)return;
  var tx=db.transaction('draft','readonly');
  tx.objectStore('draft').get('student').onsuccess=function(e){
    if(e.target.result)document.getElementById('inp-student').value=e.target.result.val||'';
  };
  tx.objectStore('draft').get('formData').onsuccess=function(e){
    if(e.target.result&&e.target.result.val)restoreForm(e.target.result.val);
  };
}
function clearDraft(){
  if(!db)return;
  var tx=db.transaction('draft','readwrite');
  tx.objectStore('draft').clear();
}
function collectAll(){
  return{
    student:document.getElementById('inp-student').value,
    ns:collect('new-surahs',false),ps:collect('past-surahs',false),
    mq:collect('mur-questions',true),pm:collect('past-mur',true),
    sj:collect('suraj-section',true),hd:collect('hadith-section',true)
  };
}

/* auto-save draft every 10s */
setInterval(saveDraft,10000);

/* ══════════════════════════════════════
   SURAH LIST
══════════════════════════════════════ */
var SP=['الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس','هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه','الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم','لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر','فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق','الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة','الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج','نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس','التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد','الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات','القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر','المسد','الإخلاص','الفلق','الناس'];
var CNT={ns:0,ps:0,mq:0,pm:0,sj:0,hd:0};

/* ══════════════════════════════════════
   FORM BUILDERS
══════════════════════════════════════ */
function extraSurah(nxt,lbl,pfx,idx){
  var n='';
  if(nxt){var nId=pfx+'n'+idx;
    n=`<div style="grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:1px dashed #ccc">
      <div class="flbl" style="color:#133020">ما سيتم حفظه القادم:</div>
      <div class="sr" style="background:#fff;margin-bottom:0">
        <div class="aw"><input class="inp" id="sr-${nId}" placeholder="السورة..."><div class="ad" id="dp-${nId}"></div></div>
        <div class="sw"><select class="inp" id="sl-${nId}" onchange="togR('rn-${nId}',this.value)"><option value="full">كاملةً</option><option value="range">من/إلى</option></select></div>
        <div class="rr2 hidden" id="rn-${nId}" style="grid-column:1/-1"><div><input class="inp num" id="f-${nId}" type="number" placeholder="من"></div><div><input class="inp num" id="t-${nId}" type="number" placeholder="إلى"></div></div>
      </div></div>`;}
  return `<div style="grid-column:1/-1;margin-top:5px;padding-top:5px;border-top:1px dashed #ccc">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
      <div class="sw"><select class="inp rs"><option value="">تقييم ${lbl}</option><option value="ممتاز 🌟">ممتاز 🌟</option><option value="جيد جداً ⭐">جيد جداً ⭐</option><option value="جيد 👍">جيد 👍</option><option value="يحتاج مراجعة 📖">يحتاج مراجعة 📖</option></select></div>

function ac(inp,drop){
  if(!inp||!drop)return;
  inp.addEventListener('input',function(){
    var v=inp.value;if(!v.trim()){drop.style.display='none';return;}
    var m=SP.filter(function(s){return s.includes(v);}).slice(0,5);
    if(!m.length){drop.style.display='none';return;}
    drop.innerHTML=m.map(function(x){return'<div class="ai" onclick="pickAC(\''+inp.id+'\',\''+drop.id+'\',\''+x+'\')">'+x+'</div>';}).join('');
    drop.style.display='block';
  });
}
function pickAC(a,b,n){document.getElementById(a).value=n;document.getElementById(b).style.display='none';}

function collect(con,isQ){
  var res=[];
  document.querySelectorAll('#'+con+' > div').forEach(function(row){
    var it={rating:row.querySelector('.rs')?.value||'',errors:row.querySelector('.ei')?.value||''};
    if(!isQ){
      it.sr=row.querySelector('.msr')?.value||'';
      it.type=row.querySelector('.msl')?.value||'full';
      it.f=row.querySelector('.mf')?.value||'';it.t=row.querySelector('.mt')?.value||'';
      var nsr=row.querySelector('[id^="sr-"][id*="n"]');
      var nsl=row.querySelector('[id^="sl-"][id*="n"]');
      var nf=row.querySelector('[id^="f-"][id*="n"]');
      var nt=row.querySelector('[id^="t-"][id*="n"]');
      it.nsr=nsr?nsr.value:'';it.ntype=nsl?nsl.value:'full';
      it.nf=nf?nf.value:'';it.nt=nt?nt.value:'';
    } else {
      it.f=row.querySelector('.mqf')?.value||'';it.t=row.querySelector('.mqt')?.value||'';
      it.nf=row.querySelector('.nqf')?.value||'';it.nt=row.querySelector('.nqt')?.value||'';
    }
    if(it.sr||it.f)res.push(it);
  });
  return res;
}

/* ══════════════════════════════════════
   CANVAS CARD RENDERER
══════════════════════════════════════ */
var CW=900,PAD=32,DPR=2;

function rrect(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

function rCol(r){
  if(!r)return null;
  if(r.includes('ممتاز'))return{bg:'#052e16',fg:'#4ade80',brd:'#16a34a'};
  if(r.includes('جيد جداً'))return{bg:'#1e3a5f',fg:'#60a5fa',brd:'#2563eb'};
  if(r.includes('جيد'))return{bg:'#451a03',fg:'#fbbf24',brd:'#d97706'};
  return{bg:'#450a0a',fg:'#f87171',brd:'#dc2626'};
}

var SECS=[
  {k:'ns',lbl:'السور الجديدة',   ico:'📖',c1:'#0d4f35',c2:'#1a7a52',ac:'#34d399',fg:'#d1fae5',dot:'#6ee7b7'},
  {k:'ps',lbl:'ماضي السور',      ico:'📚',c1:'#1e3a5f',c2:'#2563eb',ac:'#60a5fa',fg:'#dbeafe',dot:'#93c5fd'},
  {k:'mq',lbl:'المذكرة الجديدة',ico:'✏️',c1:'#78350f',c2:'#d97706',ac:'#fbbf24',fg:'#fef3c7',dot:'#fde68a'},
  {k:'pm',lbl:'ماضي المذكرة',   ico:'📋',c1:'#4c1d95',c2:'#7c3aed',ac:'#a78bfa',fg:'#ede9fe',dot:'#c4b5fd'},
  {k:'sj',lbl:'السراج',          ico:'💡',c1:'#7c2d12',c2:'#ea580c',ac:'#fb923c',fg:'#ffedd5',dot:'#fed7aa'},
  {k:'hd',lbl:'الحديث والأذكار', ico:'📿',c1:'#134e4a',c2:'#0d9488',ac:'#2dd4bf',fg:'#ccfbf1',dot:'#99f6e4'},
];

function estH(data){
  var h=300;
  SECS.forEach(function(s){
    var items=(data[s.k]||[]).filter(function(i){return i.sr||i.f;});
    if(!items.length)return;
    h+=62;
    items.forEach(function(it){
      var extra=0;
      if(it.rating||(it.errors&&it.errors!=='0'&&it.errors!==''))extra+=40;
      if(it.nsr||(it.nf&&it.nt))extra+=38;
      h+=24+32+extra+20;
    });
    h+=16;
  });
  return Math.max(h+80,500);
}

function drawStarPat(c,cx,cy,r,col,al){
  c.save();c.globalAlpha=al;c.strokeStyle=col;c.lineWidth=1;
  var pts=[];for(var i=0;i<8;i++){var a=i*Math.PI/4;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  c.beginPath();for(var j=0;j<8;j++){c.moveTo(cx,cy);c.lineTo(pts[j][0],pts[j][1]);}c.stroke();
  c.beginPath();c.arc(cx,cy,r*.4,0,Math.PI*2);c.stroke();c.restore();
}

function pillC(c,txt,rx,ry,col,fs){
  c.font='bold '+fs+'px Cairo,sans-serif';
  var tw=c.measureText(txt).width,ph=fs+14,pw=tw+24;
  rrect(c,rx-pw,ry,pw,ph,ph/2);
  c.fillStyle=col.bg;c.fill();c.strokeStyle=col.brd;c.lineWidth=1.5;c.stroke();
  c.fillStyle=col.fg;c.textAlign='right';c.textBaseline='middle';c.fillText(txt,rx-12,ry+ph/2);
  return pw+10;
}

async function drawCard(nm,data){
  var H=estH(data);
  var canvas=document.createElement('canvas');
  canvas.width=CW*DPR;canvas.height=H*DPR;
  var c=canvas.getContext('2d');c.scale(DPR,DPR);

  var bgG=c.createLinearGradient(0,0,0,H);
  bgG.addColorStop(0,'#030d08');bgG.addColorStop(.4,'#061510');bgG.addColorStop(1,'#020a05');
  c.fillStyle=bgG;c.fillRect(0,0,CW,H);

  c.save();c.globalAlpha=.04;c.strokeStyle='#4ade80';c.lineWidth=1;
  for(var gx=0;gx<CW;gx+=60){c.beginPath();c.moveTo(gx,0);c.lineTo(gx,H);c.stroke();}
  for(var gy=0;gy<H;gy+=60){c.beginPath();c.moveTo(0,gy);c.lineTo(CW,gy);c.stroke();}
  c.restore();

  drawStarPat(c,60,60,45,'#d4af53',.18);drawStarPat(c,CW-60,60,45,'#d4af53',.18);
  drawStarPat(c,60,H-60,35,'#d4af53',.10);drawStarPat(c,CW-60,H-60,35,'#d4af53',.10);

  var HDR=240;
  var glow=c.createRadialGradient(CW/2,HDR/2,20,CW/2,HDR/2,160);
  glow.addColorStop(0,'rgba(52,211,153,.22)');glow.addColorStop(.5,'rgba(16,185,129,.08)');glow.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=glow;c.fillRect(0,0,CW,HDR+40);

  var topBar=c.createLinearGradient(0,0,CW,0);
  topBar.addColorStop(0,'transparent');topBar.addColorStop(.2,'#d4af53');topBar.addColorStop(.5,'#fcd34d');topBar.addColorStop(.8,'#d4af53');topBar.addColorStop(1,'transparent');
  c.fillStyle=topBar;c.fillRect(0,0,CW,4);

  c.font='72px serif';c.textAlign='center';c.textBaseline='top';c.fillText('🕌',CW/2,12);

  c.save();c.shadowColor='#34d399';c.shadowBlur=30;
  c.font='900 36px Cairo,sans-serif';
  var tg=c.createLinearGradient(CW*.2,0,CW*.8,0);
  tg.addColorStop(0,'#a7f3d0');tg.addColorStop(.4,'#fcd34d');tg.addColorStop(.7,'#fbbf24');tg.addColorStop(1,'#a7f3d0');
  c.fillStyle=tg;c.textAlign='center';c.textBaseline='top';c.fillText('مركز خادم القرآن الكريم',CW/2,92);c.restore();

  var dl=c.createLinearGradient(PAD,0,CW-PAD,0);
  dl.addColorStop(0,'transparent');dl.addColorStop(.3,'#d4af53');dl.addColorStop(.7,'#d4af53');dl.addColorStop(1,'transparent');
  c.strokeStyle=dl;c.lineWidth=1.5;c.setLineDash([]);c.beginPath();c.moveTo(PAD*3,138);c.lineTo(CW-PAD*3,138);c.stroke();

  c.font='15px Cairo,sans-serif';c.fillStyle='rgba(167,243,208,.7)';c.textAlign='center';c.textBaseline='top';
  c.fillText('تحت إشراف الشيخ عبدالرحمن',CW/2,146);

  var BY=172,BH=54;
  c.save();c.shadowColor='#fbbf24';c.shadowBlur=40;
  rrect(c,PAD,BY,CW-PAD*2,BH,16);c.fillStyle='rgba(251,191,36,.15)';c.fill();c.restore();
  var bdG=c.createLinearGradient(PAD,BY,CW-PAD,BY+BH);
  bdG.addColorStop(0,'#92400e');bdG.addColorStop(.25,'#d97706');bdG.addColorStop(.5,'#fcd34d');bdG.addColorStop(.75,'#d97706');bdG.addColorStop(1,'#92400e');
  rrect(c,PAD,BY,CW-PAD*2,BH,16);c.fillStyle=bdG;c.fill();
  c.strokeStyle='rgba(255,255,255,.3)';c.lineWidth=2;c.stroke();
  c.font='28px serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText('🏆',PAD+40,BY+BH/2);c.fillText('⭐',CW-PAD-40,BY+BH/2);
  c.font='900 24px Cairo,sans-serif';c.fillStyle='#1c0700';c.textAlign='center';c.textBaseline='middle';
  c.fillText('بطلنا  ✦  '+nm,CW/2,BY+BH/2);

  var DY=BY+BH+10,DH=38;
  var dBg=c.createLinearGradient(0,DY,CW,DY+DH);
  dBg.addColorStop(0,'#052e16');dBg.addColorStop(.5,'#065f46');dBg.addColorStop(1,'#052e16');
  c.fillStyle=dBg;c.fillRect(0,DY,CW,DH);
  c.strokeStyle='#34d399';c.lineWidth=1.5;
  c.beginPath();c.moveTo(0,DY);c.lineTo(CW,DY);c.stroke();
  c.beginPath();c.moveTo(0,DY+DH);c.lineTo(CW,DY+DH);c.stroke();
  c.font='bold 16px Cairo,sans-serif';c.fillStyle='#6ee7b7';c.textAlign='center';c.textBaseline='middle';
  c.fillText('🗓  '+getHijri(),CW/2,DY+DH/2);

  var cy=DY+DH+20;
  SECS.forEach(function(sec){
    var items=(data[sec.k]||[]).filter(function(i){return i.sr||i.f;});
    if(!items.length)return;
    var SH=52;
    c.save();c.shadowColor=sec.ac;c.shadowBlur=20;
    rrect(c,PAD,cy,CW-PAD*2,SH,14);
    var shG=c.createLinearGradient(PAD,cy,CW-PAD,cy+SH);
    shG.addColorStop(0,sec.c1);shG.addColorStop(.6,sec.c2);shG.addColorStop(1,sec.c1);
    c.fillStyle=shG;c.fill();c.restore();
    rrect(c,PAD,cy,CW-PAD*2,SH,14);c.strokeStyle=sec.ac;c.lineWidth=1.5;c.stroke();
    rrect(c,CW-PAD-10,cy,10,SH,5);c.fillStyle=sec.ac;c.fill();
    c.font='24px serif';c.textAlign='right';c.textBaseline='middle';c.fillText(sec.ico,CW-PAD-20,cy+SH/2);
    c.font='bold 20px Cairo,sans-serif';c.fillStyle=sec.fg;c.textAlign='right';c.textBaseline='middle';
    c.fillText(sec.lbl,CW-PAD-54,cy+SH/2);
    cy+=SH+10;

    items.forEach(function(it){
      var hasMeta=!!(it.rating||(it.errors&&it.errors!=='0'&&it.errors!==''));
      var hasPlan=!!(it.nsr||(it.nf&&it.nt));
      var IH=20+34+(hasMeta?40:0)+(hasPlan?38:0)+20;
      c.save();c.shadowColor=sec.dot;c.shadowBlur=16;c.shadowOffsetY=4;
      rrect(c,PAD,cy,CW-PAD*2,IH,14);
      var cBg=c.createLinearGradient(PAD,cy,CW-PAD,cy+IH);
      cBg.addColorStop(0,'#0a1a0f');cBg.addColorStop(1,'#0d2016');
      c.fillStyle=cBg;c.fill();c.restore();
      rrect(c,PAD,cy,CW-PAD*2,IH,14);c.strokeStyle=sec.dot;c.lineWidth=1.5;c.stroke();
      rrect(c,CW-PAD-10,cy,10,IH,5);c.fillStyle=sec.ac;c.fill();
      rrect(c,PAD,cy,5,IH,3);c.fillStyle=sec.c2+'55';c.fill();
      var RX=CW-PAD-22,ty=cy+18;
      var lbl2='';
      if(it.sr){lbl2=it.sr+(it.type==='range'?'  —  من آية '+it.f+' إلى آية '+it.t:'  كاملة');}
      else{var isRq=(sec.k==='sj'||sec.k==='hd');var u=isRq?'رقم':'سؤال';lbl2='من '+u+' '+it.f+'  ←  إلى '+u+' '+it.t;}
      c.font='bold 20px Cairo,sans-serif';c.fillStyle=sec.fg;c.textAlign='right';c.textBaseline='top';c.fillText(lbl2,RX,ty);
      ty+=34;
      if(hasMeta){
        var bx=RX;
        if(it.rating){var rc=rCol(it.rating);bx-=pillC(c,it.rating,bx,ty,rc,14);}
        if(it.errors&&it.errors!=='0'&&it.errors!==''){pillC(c,'❌ '+it.errors+' خطأ',bx,ty,{bg:'#450a0a',fg:'#fca5a5',brd:'#dc2626'},14);}
        ty+=40;
      }
      if(hasPlan){
        rrect(c,PAD+12,ty-2,CW-PAD*2-24,34,9);
        var pBg=c.createLinearGradient(PAD+12,ty,CW-PAD-12,ty+34);
        pBg.addColorStop(0,sec.c1);pBg.addColorStop(1,sec.c2+'88');
        c.fillStyle=pBg;c.fill();c.strokeStyle=sec.ac;c.lineWidth=1;c.setLineDash([5,3]);c.stroke();c.setLineDash([]);
        var nxt2='';
        if(it.nsr){nxt2='🎯 القادم:  '+it.nsr+(it.ntype==='range'?' — آية '+it.nf+' إلى آية '+it.nt:'  كاملة');}
        else{var isRq2=(sec.k==='sj'||sec.k==='hd');var u2=isRq2?'رقم':'سؤال';nxt2='🎯 القادم:  من '+u2+' '+it.nf+'  ←  إلى '+u2+' '+it.nt;}
        c.font='bold 15px Cairo,sans-serif';c.fillStyle=sec.ac;c.textAlign='right';c.textBaseline='middle';c.fillText(nxt2,RX-4,ty+17);
      }
      cy+=IH+10;
    });
    cy+=12;
  });

  var FH=64;
  var fBg=c.createLinearGradient(0,cy,CW,cy+FH);
  fBg.addColorStop(0,'#030d08');fBg.addColorStop(.5,'#052e16');fBg.addColorStop(1,'#030d08');
  c.fillStyle=fBg;c.fillRect(0,cy,CW,FH);
  var fLine=c.createLinearGradient(0,cy,CW,cy);
  fLine.addColorStop(0,'transparent');fLine.addColorStop(.3,'#d4af53');fLine.addColorStop(.7,'#d4af53');fLine.addColorStop(1,'transparent');
  c.strokeStyle=fLine;c.lineWidth=2;c.setLineDash([]);c.beginPath();c.moveTo(0,cy);c.lineTo(CW,cy);c.stroke();
  c.font='bold 15px Cairo,sans-serif';c.fillStyle='#d4af53';c.textAlign='right';c.textBaseline='middle';c.fillText('مركز خادم القرآن الكريم',CW-PAD,cy+FH/2);
  c.font='26px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('⭐ ⭐ ⭐',CW/2,cy+FH/2);
  c.font='13px Cairo,sans-serif';c.fillStyle='rgba(167,243,208,.4)';c.textAlign='left';c.textBaseline='middle';c.fillText('تقرير متابعة الحفظ',PAD,cy+FH/2);
  var botBar=c.createLinearGradient(0,cy+FH-3,CW,cy+FH);
  botBar.addColorStop(0,'transparent');botBar.addColorStop(.2,'#d4af53');botBar.addColorStop(.8,'#d4af53');botBar.addColorStop(1,'transparent');
  c.fillStyle=botBar;c.fillRect(0,cy+FH-3,CW,3);
  return canvas;
}

/* canvas → compressed blob (JPEG quality 0.82 → ~80% smaller than PNG) */
function canvasToBlob(canvas,q){
  return new Promise(function(res){canvas.toBlob(function(b){res(b);},'image/jpeg',q||0.82);});
}
/* blob → data URL */
function blobToDataURL(blob){
  return new Promise(function(res){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.readAsDataURL(blob);});
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
function showModal(src,nm,onSave){
  var m=document.createElement('div');m.className='modal-ov';
  m.innerHTML='<img src="'+src+'" style="max-width:100%;max-height:72vh;border-radius:16px;box-shadow:0 0 60px rgba(52,211,153,.3)">'
    +'<div class="modal-btns">'
    +'<button class="mb mb-close" id="mc">إغلاق</button>'
    +'<button class="mb mb-save" id="ms">💾 حفظ بطاقة البطل</button>'
    +'</div>';
  document.body.appendChild(m);
  m.querySelector('#mc').onclick=function(){m.remove();};
  m.querySelector('#ms').onclick=function(){
    var a=document.createElement('a');a.href=src;a.download='بطاقة_البطل_'+(nm||'')+'.jpg';a.click();
    if(onSave)onSave();
  };
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
}

/* ══════════════════════════════════════
   GENERATE & SAVE
══════════════════════════════════════ */
async function generateAndShare(){
  var nm=document.getElementById('inp-student').value.trim();
  if(!nm){alert('يرجى إدخال اسم البطل');return;}
  var data={
    ns:collect('new-surahs',false),ps:collect('past-surahs',false),
    mq:collect('mur-questions',true),pm:collect('past-mur',true),
    sj:collect('suraj-section',true),hd:collect('hadith-section',true)
  };
  showSpinner('جارٍ إنشاء بطاقة البطل...');
  try{
    var canvas=await drawCard(nm,data);
    var blob=await canvasToBlob(canvas,0.82);
    var src=await blobToDataURL(blob);
    hideSpinner();

    /* save to IndexedDB */
    await saveReport(nm,data,blob);
    saveDraft();
    showToast('✅ تم حفظ التقرير في السجل');

    /* share or show modal */
    if(navigator.share&&navigator.canShare){
      try{
        var file=new File([blob],'بطاقة_البطل_'+nm+'.jpg',{type:'image/jpeg'});
        if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'بطاقة البطل — '+nm});return;}
      }catch(e){}
    }
    showModal(src,nm);
  }catch(e){hideSpinner();alert('خطأ: '+e.message);}
}

/* ══════════════════════════════════════
   REPORTS PAGE
══════════════════════════════════════ */
async function renderReports(){
  var list=document.getElementById('rep-list');
  list.innerHTML='<div style="text-align:center;padding:30px;color:#888">جارٍ التحميل...</div>';
  var reps=await getAllReports();
  if(!reps.length){
    list.innerHTML='<div class="rep-empty"><div class="rep-empty-ico">📭</div><div class="rep-empty-txt">لا توجد تقارير محفوظة بعد</div></div>';
    return;
  }

  /* check expiry */
  var expiring=reps.filter(function(r){return isOlderThanMonth(r.createdAt);});
  var html='';
  if(expiring.length){
    html+='<div class="exp-banner"><div class="exp-ico">⚠️</div><div style="flex:1"><div class="exp-txt">يوجد '+expiring.length+' تقرير مر عليه أكثر من شهر.<br>هل تريد حفظ نسخة قبل الحذف؟</div><div class="exp-actions"><button class="exp-btn exp-save" onclick="exportExpiring()">💾 حفظ نسخة</button><button class="exp-btn exp-del" onclick="deleteExpiring()">🗑 حذف القديمة</button></div></div></div>';
  }

  reps.slice().reverse().forEach(function(r){
    var old=isOlderThanMonth(r.createdAt);
    var thumbId='thumb-'+r.id;
    html+='<div class="rep-card-item"><div class="rep-card-top">'
      +'<div class="rep-thumb-ph" id="'+thumbId+'">🕌</div>'
      +'<div class="rep-info">'
        +'<div class="rep-name">'+r.student+'</div>'
        +'<div class="rep-date"><span>📅</span>'+fmtDate(r.createdAt)+'</div>'
        +(r.hijri?'<div class="rep-hijri">'+r.hijri+'</div>':'')
        +(old?'<div class="rep-badge-old">⏳ مر عليه شهر</div>':'')
      +'</div></div>'
      +'<div class="rep-actions">'
        +'<button class="ra ra-view" onclick="viewReport('+r.id+')">👁 عرض</button>'
        +'<button class="ra ra-edit" onclick="editReport('+r.id+')">✏️ تعديل</button>'
        +'<button class="ra ra-del" onclick="deleteRep('+r.id+')">🗑 حذف</button>'
      +'</div></div>';
  });
  list.innerHTML=html;

  /* load thumbnails async */
  reps.forEach(function(r){
    if(r.img){
      blobToDataURL(r.img).then(function(src){
        var el=document.getElementById('thumb-'+r.id);
        if(el){var img=document.createElement('img');img.className='rep-thumb';img.src=src;el.replaceWith(img);}
      });
    }
  });
}

async function viewReport(id){
  var r=await getReport(id);
  if(!r||!r.img){showToast('لا توجد صورة');return;}
  var src=await blobToDataURL(r.img);
  showModal(src,r.student);
}

async function editReport(id){
  var r=await getReport(id);
  if(!r){return;}
  /* go to main, fill student name — full form restore is complex */
  document.getElementById('inp-student').value=r.student;
  showPage('page-main');
  showToast('✏️ عدّل البيانات وأنشئ تقريراً جديداً');
}

async function deleteRep(id){
  confirm2('🗑','حذف التقرير','هل أنت متأكد من حذف هذا التقرير؟ لا يمكن التراجع.','حذف',async function(){
    await deleteReport(id);renderReports();showToast('تم الحذف');
  });
}

function confirmDeleteAll(){
  confirm2('⚠️','حذف جميع التقارير','سيتم حذف كل التقارير المحفوظة نهائياً.\nهل تريد المتابعة؟','حذف الكل',async function(){
    await deleteAllReports();renderReports();showToast('تم حذف جميع التقارير');
  });
}

async function exportAll(){
  var reps=await getAllReports();
  if(!reps.length){showToast('لا توجد تقارير');return;}
  showToast('جارٍ تصدير '+reps.length+' تقرير...',4000);
  for(var i=0;i<reps.length;i++){
    var r=reps[i];
    if(r.img){
      var src=await blobToDataURL(r.img);
      var a=document.createElement('a');a.href=src;
      a.download='تقرير_'+r.student+'_'+i+'.jpg';a.click();
      await new Promise(function(res){setTimeout(res,400);});
    }
  }
}

async function exportExpiring(){
  var reps=await getAllReports();
  var exp=reps.filter(function(r){return isOlderThanMonth(r.createdAt);});
  for(var i=0;i<exp.length;i++){
    var r=exp[i];
    if(r.img){
      var src=await blobToDataURL(r.img);
      var a=document.createElement('a');a.href=src;a.download='تقرير_قديم_'+r.student+'.jpg';a.click();
      await new Promise(function(res){setTimeout(res,400);});
    }
  }
  showToast('تم تصدير '+exp.length+' تقرير قديم');
}

async function deleteExpiring(){
  confirm2('🗑','حذف التقارير القديمة','سيتم حذف التقارير التي مر عليها أكثر من شهر.','حذف',async function(){
    var reps=await getAllReports();
    var exp=reps.filter(function(r){return isOlderThanMonth(r.createdAt);});
    for(var i=0;i<exp.length;i++)await deleteReport(exp[i].id);
    renderReports();showToast('تم حذف '+exp.length+' تقرير قديم');
  });
}

/* ══════════════════════════════════════
   CLEAR FORM
══════════════════════════════════════ */
function confirmClearForm(){
  confirm2('🔄','مسح البيانات','سيتم مسح جميع البيانات المُدخلة لتسجيل بطل جديد.\nالتقارير المحفوظة لن تُمسح.','مسح وبدء جديد',function(){
    clearForm();clearDraft();showToast('تم المسح — جاهز لبطل جديد 🌟');
  });
}

function clearForm(){
  document.getElementById('inp-student').value='';
  ['new-surahs','past-surahs','mur-questions','past-mur','suraj-section','hadith-section'].forEach(function(id){
    document.getElementById(id).innerHTML='';
  });
  CNT={ns:0,ps:0,mq:0,pm:0,sj:0,hd:0};
  addSurah('new-surahs','ns',true,true);
  addSurah('past-surahs','ps',true,false);
  addQuestion('mur-questions','mq',true,true);
  addQuestion('past-mur','pm',true,false);
  addQuestion('suraj-section','sj',true,true);
  addQuestion('hadith-section','hd',true,true);
}

window.addEventListener('beforeunload',function(e){

});
