<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز خادم القرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --bright-green: #32ff7e;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* شريط النصائح المحدث */
        .ticker-container {
            width: 95%;
            margin: 20px auto;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .ticker-icon { font-size: 0.9rem; margin-left: 10px; color: var(--bright-green); }

        .ticker-wrap { width: 100%; overflow: hidden; }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll 40s linear infinite; /* حركة بطيئة جداً */
            font-size: 1.2rem;
            font-weight: bold;
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* كروت زجاجية لامعة */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
        }

        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon-blue); }

        .card h3 { font-size: 1.8rem; margin: 10px 0; }

        .btn {
            background: var(--neon-blue);
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- شريط النصائح -->
    <div class="ticker-container">
        <i class="fas fa-star ticker-icon"></i>
        <div class="ticker-wrap">
            <div class="ticker-text">
                🌟 تلاوة القرآن تضيء القلب .. 💡 حافظ على صلاتك فهي سر نجاحك .. 🚀 تعلم اليوم شيئاً جديداً لترتقي .. 🌈 كن بشوشاً فابتسامتك صدقة .. ✍️ ورتل القرآن ترتيلاً .. 📖 القرآن ربيع القلوب .. ✨ استغفر الله تجد الراحة ..
            </div>
        </div>
    </div>

    <!-- الكروت -->
    <div class="cards-container">
        <div class="card" onclick="alert('جاري الانتقال...')">
            <h3>📖 السراج المنير</h3>
            <p>أجوبة قرانية ممتعة</p>
            <button class="btn">دخول</button>
        </div>
        <div class="card">
            <h3>🌈 الحياة السعيدة</h3>
            <p>قصص وعبر للأطفال والكبار</p>
            <button class="btn">دخول</button>
        </div>
    </div>

    <script>
        // تفعيل الصوت عند البداية
        function startWebsite() {
            const audio = new Audio("https://everyayah.com/data/Husary_128kbps/073004.mp3");
            audio.currentTime = 3.4;
            audio.play();
        }
    </script>
</body>
</html>
