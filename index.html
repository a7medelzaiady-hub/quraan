<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز خادم القرآن الكريم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@600;800&display=swap" rel="stylesheet">

    <style>
        /* الألوان الأساسية المستوحاة من التصميم */
        :root {
            --dark-green: #0a4d3c;
            --gold: #d4af37;
            --light-gold: #fdfaf2;
            --bg-color: #f5f1e6; 
            --text-dark: #2c3e50;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.02) 0px, rgba(212, 175, 55, 0.02) 2px, transparent 2px, transparent 10px);
        }

        /* رأس الصفحة الهيدر */
        header {
            background-color: var(--dark-green);
            color: white;
            text-align: center;
            padding: 45px 10px 25px; /* تقليل البادينج الجانبي قليلاً للموبايل */
            border-bottom: 6px solid var(--gold);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 25px rgba(10, 77, 60, 0.2);
            margin-bottom: 30px;
            overflow: hidden;
        }

        header h1 {
            font-family: 'Amiri', serif;
            /* استخدام حجم خط ديناميكي يتكيف مع الشاشة ويمنع النزول لسطر جديد */
            font-size: clamp(1.6rem, 6.5vw, 3.2rem); 
            white-space: nowrap; /* هذا السطر يضمن بقاء الكلمات بجانب بعضها تماماً */
            margin: 0;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        header p {
            font-size: clamp(1rem, 4vw, 1.3rem);
            margin: 8px 0 0 0;
            color: #e2ece9;
            font-weight: 500;
        }

        /* لافتة الترحيب (المخطوطة الذهبية) */
        .welcome-banner {
            background: linear-gradient(135deg, #f3e1ad, #d4af37);
            color: var(--dark-green);
            width: 85%;
            max-width: 480px;
            margin: -45px auto 35px;
            padding: 12px 20px;
            border-radius: 50px;
            text-align: center;
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative;
            z-index: 10;
            border: 3px solid white;
        }

        /* حاوية الكروت متوافقة مع الشاشات والموبايل */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* تصميم الكارت المطور */
        .card {
            background-color: white;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(214, 175, 55, 0.5);
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(10, 77, 60, 0.15);
            border-color: var(--gold);
        }

        .card-header {
            background-color: var(--dark-green);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 4px solid var(--gold);
        }

        .card-body {
            background-color: var(--light-gold);
            padding: 25px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .card-body p {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dark-green);
        }

        .stars {
            color: #ffb13b;
            font-size: 1.3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-enter {
            background-color: var(--dark-green);
            color: white;
            box-shadow: 0 4px 10px rgba(10, 77, 60, 0.2);
        }

        .btn-enter:hover {
            background-color: #0e6650;
        }

        .btn-share {
            background-color: white;
            color: var(--text-dark);
            border: 2px solid #ddd;
        }

        .btn-share:hover {
            background-color: #f1f2f6;
            border-color: #bbb;
        }

        .btn-share::before {
            content: "🔗";
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <header>
        <h1>مَرْكَزُ خَادِمِ القُرْآنِ الكَرِيمِ</h1>
        <p>تحت إشراف الشيخ عبدالرحمن</p>
    </header>

    <div class="welcome-banner">
        🏆 أهلاً بك يا بطل 🏆
    </div>

    <main class="cards-container">
        
        <div class="card" data-href="السراج المنير.html">
            <div class="card-header">📖 السراج المنير</div>
            <div class="card-body">
                <p>أسئلة وأجوبة</p>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <div class="card-actions">
                    <button class="btn btn-enter">🎯 دخول</button>
                    <button class="btn btn-share" data-title="السراج المنير" data-url="السراج المنير.html">مشاركة</button>
                </div>
            </div>
        </div>

        <div class="card" data-href="الاسئله المفيده للحياه السعيده.html">
            <div class="card-header">🌿 الحياة السعيدة</div>
            <div class="card-body">
                <p>قصص وعبر مفيدة</p>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <div class="card-actions">
                    <button class="btn btn-enter">🎯 دخول</button>
                    <button class="btn btn-share" data-title="الحياة السعيدة" data-url="الاسئله المفيده للحياه السعيده.html">مشاركة</button>
                </div>
            </div>
        </div>

        <div class="card" data-href="index1.html">
            <div class="card-header">📝 التقييم والمتابعة</div>
            <div class="card-body">
                <p>متابعة الإنجاز اليومي</p>
                <div class="stars">⭐⭐⭐⭐★</div>
                <div class="card-actions">
                    <button class="btn btn-enter">🎯 دخول</button>
                    <button class="btn btn-share" data-title="التقييم والمتابعة" data-url="index1.html">مشاركة</button>
                </div>
            </div>
        </div>

        <div class="card" data-href="#">
            <div class="card-header">🏆 لوحة الشرف</div>
            <div class="card-body">
                <p>الأبطال المتميزين</p>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <div class="card-actions">
                    <button class="btn btn-enter" style="background-color: #aaa; cursor: not-allowed;">🔒 قريباً</button>
                    <button class="btn btn-share" data-title="لوحة الشرف" data-url="#">مشاركة</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const sound = document.getElementById('clickSound');
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.addEventListener('click', function(event) {
                if (event.target.closest('.btn-share')) return;

                const targetUrl = this.getAttribute('data-href');
                if (!targetUrl || targetUrl === '#') return;

                sound.currentTime = 0;
                sound.play();

                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 300);
            });
        });

        const shareButtons = document.querySelectorAll('.btn-share');
        shareButtons.forEach(button => {
            button.addEventListener('click', function(event) {
                event.stopPropagation(); 

                sound.currentTime = 0;
                sound.play();

                const title = this.getAttribute('data-title');
                const pageUrl = this.getAttribute('data-url');
                
                if (pageUrl === '#') {
                    alert('هذه الصفحة غير متوفرة للمشاركة حالياً.');
                    return;
                }

                const fullUrl = new URL(pageUrl, window.location.href).href;

                if (navigator.share) {
                    navigator.share({
                        title: title,
                        text: `شاهد صفحة ${title} بموقع مركز خادم القرآن الكريم ✨:`,
                        url: fullUrl
                    }).catch(err => console.log('تم إلغاء المشاركة'));
                } else {
                    navigator.clipboard.writeText(fullUrl).then(() => {
                        alert(`📋 تم نسخ رابط صفحة [${title}] بنجاح!\nيمكنك الآن لصقه وإرساله لأي شخص على الواتساب أو الماسنجر.`);
                    }).catch(err => {
                        alert(`رابط الصفحة هو: ${fullUrl}`);
                    });
                }
            });
        });
    </script>

</body>
</html>
