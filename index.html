<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مركز خادم القرآن - متابعة الحفظ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --gd:#0b1e14;--gm:#133020;--gl:#1c422c;
  --gold:#d4af53;--goldl:#ebd084;
  --cream:#f9f5ee;--border:#dde8e0;--text:#1a1a1a;--sub:#5a6b61;--red:#dc2626;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{direction:rtl;font-family:'Cairo',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden}
.hdr{background:linear-gradient(160deg,var(--gd),var(--gm));padding:20px 16px 24px;text-align:center}
.hdr-emblem{width:56px;height:56px;margin:0 auto 10px;background:rgba(212,175,83,.15);border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px}
.hdr-title{color:#fff;font-family:'Amiri',serif;font-size:22px;font-weight:700}
.hdr-sub{color:var(--goldl);font-size:13px;font-weight:600;margin-top:6px}
.body{padding:14px 14px 100px}
.sec{background:#fff;border-radius:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sh{background:var(--gm);padding:11px 14px;border-radius:14px 14px 0 0}
.sh-t{color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.sh-t i{color:var(--goldl);font-size:16px}
.sb{padding:12px}
.flbl{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.frow{margin-bottom:9px}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);background:#fafcfa;outline:none}
.inp.num{text-align:center;font-size:14px;font-weight:700}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gm);font-size:12px;pointer-events:none}
select.inp{padding-left:28px;cursor:pointer}
.aw{position:relative}
.ad{display:none;position:absolute;top:calc(100% + 4px);right:0;left:0;background:#fff;border:1.5px solid var(--gm);border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15);max-height:200px;overflow-y:auto}
.ai{padding:9px 13px;font-size:13px;font-family:'Amiri',serif;cursor:pointer;border-bottom:.5px solid #eef4f0}
.sr,.qr{display:grid;grid-template-columns:1fr 130px;gap:8px;margin-bottom:8px;background:var(--cream);border-radius:10px;padding:9px;border:1px solid var(--border);position:relative}
.qr{grid-template-columns:1fr 1fr}
.db{position:absolute;left:-6px;top:-6px;width:22px;height:22px;border-radius:50%;background:#fff;border:1.5px solid #fca5a5;color:var(--red);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rr2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)}
.rr2.hidden{display:none}
.abtn{width:100%;padding:8px;margin-top:2px;border:1.5px dashed var(--gm);border-radius:9px;background:transparent;color:var(--gm);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.sw2{position:fixed;bottom:0;right:0;left:0;background:#fff;padding:12px 14px;border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:200}
.sbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gm),var(--gl));color:var(--goldl);border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-emblem">🕌</div>
  <div class="hdr-title">مركز خادم القرآن الكريم</div>
  <div class="hdr-sub">تحت إشراف الشيخ عبدالرحمن</div>
</div>
<div class="body">
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-user"></i>بيانات البطل</div></div>
    <div class="sb"><div class="frow"><div class="flbl">اسم البطل</div>
      <input class="inp" id="inp-student" placeholder="أدخل اسم البطل...">
      <button onclick="loadStudentData()" class="abtn" style="margin-top:10px"><i class="ti ti-photo"></i> استرجاع التقرير السابق</button>
    </div></div>
  </div>
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-book"></i>السور الجديدة</div></div>
    <div class="sb"><div id="new-surahs"></div><button class="abtn" onclick="addSurah('new-surahs','ns',true,true)"><i class="ti ti-plus"></i> إضافة سورة</button></div>
  </div>
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-books"></i>ماضي السور</div></div>
    <div class="sb"><div id="past-surahs"></div><button class="abtn" onclick="addSurah('past-surahs','ps',true,false)"><i class="ti ti-plus"></i> إضافة سورة</button></div>
  </div>
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-pencil"></i>أسئلة المذكرة الجديدة</div></div>
    <div class="sb"><div id="mur-questions"></div><button class="abtn" onclick="addQuestion('mur-questions','mq',true,true)"><i class="ti ti-plus"></i> إضافة أسئلة</button></div>
  </div>
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-history"></i>ماضي المذكرة</div></div>
    <div class="sb"><div id="past-mur"></div><button class="abtn" onclick="addQuestion('past-mur','pm',true,false)"><i class="ti ti-plus"></i> إضافة أسئلة</button></div>
  </div>
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-bulb"></i>السراج</div></div>
    <div class="sb"><div id="suraj-section"></div><button class="abtn" onclick="addQuestion('suraj-section','sj',true,true)"><i class="ti ti-plus"></i> إضافة سؤال</button></div>
  </div>
  <div class="sec"><div class="sh"><div class="sh-t"><i class="ti ti-feather"></i>الحديث والأذكار</div></div>
    <div class="sb"><div id="hadith-section"></div><button class="abtn" onclick="addQuestion('hadith-section','hd',true,true)"><i class="ti ti-plus"></i> إضافة حديث / ذكر</button></div>
  </div>
</div>
<div class="sw2"><button class="sbtn" onclick="generateAndShare()">✨ إنشاء بطاقة البطل ومشاركتها</button></div>

<script>
/* ─────────── SURAH LIST ─────────── */
var SP=['الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس','هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه','الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم','لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر','فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق','الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة','الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج','نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس','التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد','الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات','القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر','المسد','الإخلاص','الفلق','الناس'];
var CNT={ns:0,ps:0,mq:0,pm:0,sj:0,hd:0};

/* ─────────── FORM BUILDERS ─────────── */
function extraSurah(nxt,lbl,pfx,idx){
  var n='';
  if(nxt){var nId=pfx+'n'+idx;
    n=`<div style="grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:1px dashed #ccc">
      <div class="flbl" style="color:#133020">ما سيتم حفظه القادم:</div>
      <div class="sr" style="background:#fff;margin-bottom:0">
        <div class="aw"><input class="inp" id="sr-${nId}" placeholder="السورة..."><div class="ad" id="dp-${nId}"></div></div>
        <div class="sw"><select class="inp" id="sl-${nId}" onchange="togR('rn-${nId}',this.value)"><option value="full">كاملةً</option><option value="range">من/إلى</option></select></div>
        <div class="rr2 hidden" id="rn-${nId}" style="grid-column:1/-1"><div><input class="inp num" id="f-${nId}" type="number" placeholder="من"></div><div><input class="inp num" id="t-${nId}" type="number" placeholder="إلى"></div></div>
      </div></div>`;}
  return `<div style="grid-column:1/-1;margin-top:5px;padding-top:5px;border-top:1px dashed #ccc">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
      <div class="sw"><select class="inp rs"><option value="">تقييم ${lbl}</option><option value="ممتاز 🌟">ممتاز 🌟</option><option value="جيد جداً ⭐">جيد جداً ⭐</option><option value="جيد 👍">جيد 👍</option><option value="يحتاج مراجعة 📖">يحتاج مراجعة 📖</option></select></div>
      <input class="inp num ei" type="number" placeholder="عدد الأخطاء">
    </div>${n}</div>`;
}

function extraQ(nxt,lbl,isRng){
  var pF=isRng?'من رقم':'من س', pT=isRng?'إلى رقم':'إلى س';
  var n='';
  if(nxt){n=`<div style="grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:1px dashed #ccc">
    <div class="flbl" style="color:#133020">ما سيتم حفظه القادم:</div>
    <div class="qr" style="background:#fff;margin-bottom:0">
      <div><input class="inp num nqf" type="number" placeholder="${pF}"></div>
      <div><input class="inp num nqt" type="number" placeholder="${pT}"></div>
    </div></div>`;}
  return `<div style="grid-column:1/-1;margin-top:5px;padding-top:5px;border-top:1px dashed #ccc">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
      <div class="sw"><select class="inp rs"><option value="">تقييم ${lbl}</option><option value="ممتاز 🌟">ممتاز 🌟</option><option value="جيد جداً ⭐">جيد جداً ⭐</option><option value="جيد 👍">جيد 👍</option><option value="يحتاج مراجعة 📖">يحتاج مراجعة 📖</option></select></div>
      <input class="inp num ei" type="number" placeholder="عدد الأخطاء">
    </div>${n}</div>`;
}

function addSurah(con,pfx,extra,nxt){
  CNT[pfx]++;var i=CNT[pfx];
  var d=document.createElement('div');d.className='sr';d.id='row-'+pfx+i;
  var lbl=(pfx==='ns')?'السورة':(pfx==='ps'?'الماضي':'القسم');
  d.innerHTML=(i>1?'<button class="db" onclick="del(\'row-'+pfx+i+'\')">✕</button>':'')+
    '<div class="aw"><input class="inp msr" id="sr-'+pfx+i+'" placeholder="السورة..."><div class="ad" id="dp-'+pfx+i+'"></div></div>'+
    '<div class="sw"><select class="inp msl" id="sl-'+pfx+i+'" onchange="togR(\'rn-'+pfx+i+'\',this.value)"><option value="full">كاملةً</option><option value="range">من/إلى</option></select></div>'+
    '<div class="rr2 hidden" id="rn-'+pfx+i+'" style="grid-column:1/-1"><div><input class="inp num mf" id="f-'+pfx+i+'" type="number" placeholder="من"></div><div><input class="inp num mt" id="t-'+pfx+i+'" type="number" placeholder="إلى"></div></div>'+
    (extra?extraSurah(nxt,lbl,pfx,i):'');
  document.getElementById(con).appendChild(d);
  ac(document.getElementById('sr-'+pfx+i),document.getElementById('dp-'+pfx+i));
  if(nxt){var nId=pfx+'n'+i;ac(document.getElementById('sr-'+nId),document.getElementById('dp-'+nId));}
}

function addQuestion(con,pfx,extra,nxt){
  CNT[pfx]++;var i=CNT[pfx];
  var d=document.createElement('div');d.className='qr';d.id='qrow-'+pfx+i;
  var isRng=(pfx==='hd'||pfx==='sj');
  var lbl=(pfx==='mq')?'المذكرة':(pfx==='pm'?'الماضي':(pfx==='sj'?'السراج':'الحديث'));
  var pF=isRng?'من رقم':'من س', pT=isRng?'إلى رقم':'إلى س';
  d.innerHTML=(i>1?'<button class="db" onclick="del(\'qrow-'+pfx+i+'\')">✕</button>':'')+
    '<div><input class="inp num mqf" id="qf-'+pfx+i+'" type="number" placeholder="'+pF+'"></div>'+
    '<div><input class="inp num mqt" id="qt-'+pfx+i+'" type="number" placeholder="'+pT+'"></div>'+
    (extra?extraQ(nxt,lbl,isRng):'');
  document.getElementById(con).appendChild(d);
}

function ac(inp,drop){
  if(!inp||!drop)return;
  inp.addEventListener('input',function(){
    var v=inp.value;if(!v.trim()){drop.style.display='none';return;}
    var m=SP.filter(s=>s.includes(v)).slice(0,5);
    if(!m.length){drop.style.display='none';return;}
    drop.innerHTML=m.map(x=>'<div class="ai" onclick="pickAC(\''+inp.id+'\',\''+drop.id+'\',\''+x+'\')">'+x+'</div>').join('');
    drop.style.display='block';
  });
}
function pickAC(a,b,n){document.getElementById(a).value=n;document.getElementById(b).style.display='none';}
function del(id){document.getElementById(id).remove();}
function togR(id,v){var e=document.getElementById(id);if(e)e.classList.toggle('hidden',v!=='range');}

function collect(con,isQ){
  var res=[];
  document.querySelectorAll('#'+con+' > div').forEach(function(row){
    var it={rating:row.querySelector('.rs')?.value||'',errors:row.querySelector('.ei')?.value||''};
    if(!isQ){
      it.sr=row.querySelector('.msr')?.value;it.type=row.querySelector('.msl')?.value;
      it.f=row.querySelector('.mf')?.value;it.t=row.querySelector('.mt')?.value;
      it.nsr=row.querySelector('.inp[id^="sr-"][id*="n"]')?.value;
      it.ntype=row.querySelector('select[id^="sl-"][id*="n"]')?.value;
      it.nf=row.querySelector('.inp.num[id^="f-"][id*="n"]')?.value;
      it.nt=row.querySelector('.inp.num[id^="t-"][id*="n"]')?.value;
    } else {
      it.f=row.querySelector('.mqf')?.value;it.t=row.querySelector('.mqt')?.value;
      it.nf=row.querySelector('.nqf')?.value;it.nt=row.querySelector('.nqt')?.value;
    }
    if(it.sr||it.f)res.push(it);
  });
  return res;
}

/* ══════════════════════════════════════════════════════
   CANVAS CARD RENDERER — "Hero Card" Design
   Canvas width: 900px  DPR: 2  → 1800px real pixels
══════════════════════════════════════════════════════ */
var CW=900, PAD=32, DPR=2;

/* ── Rounded rect ── */
function rrect(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

/* ── Hijri date ── */
function getHijri(){
  try{return new Intl.DateTimeFormat('ar-SA-u-ca-islamic',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).format(new Date());}
  catch(e){return '';}
}

/* ── Rating colors ── */
function rCol(r){
  if(!r)return null;
  if(r.includes('ممتاز'))  return{bg:'#052e16',fg:'#4ade80',brd:'#16a34a'};
  if(r.includes('جيد جداً'))return{bg:'#1e3a5f',fg:'#60a5fa',brd:'#2563eb'};
  if(r.includes('جيد'))    return{bg:'#451a03',fg:'#fbbf24',brd:'#d97706'};
  return{bg:'#450a0a',fg:'#f87171',brd:'#dc2626'};
}

/* ── Section config ── */
var SECS=[
  {k:'ns',lbl:'السور الجديدة',   ico:'📖',c1:'#0d4f35',c2:'#1a7a52',ac:'#34d399',fg:'#d1fae5',dot:'#6ee7b7'},
  {k:'ps',lbl:'ماضي السور',      ico:'📚',c1:'#1e3a5f',c2:'#2563eb',ac:'#60a5fa',fg:'#dbeafe',dot:'#93c5fd'},
  {k:'mq',lbl:'المذكرة الجديدة',ico:'✏️',c1:'#78350f',c2:'#d97706',ac:'#fbbf24',fg:'#fef3c7',dot:'#fde68a'},
  {k:'pm',lbl:'ماضي المذكرة',   ico:'📋',c1:'#4c1d95',c2:'#7c3aed',ac:'#a78bfa',fg:'#ede9fe',dot:'#c4b5fd'},
  {k:'sj',lbl:'السراج',          ico:'💡',c1:'#7c2d12',c2:'#ea580c',ac:'#fb923c',fg:'#ffedd5',dot:'#fed7aa'},
  {k:'hd',lbl:'الحديث والأذكار', ico:'📿',c1:'#134e4a',c2:'#0d9488',ac:'#2dd4bf',fg:'#ccfbf1',dot:'#99f6e4'},
];

/* ── Height estimator ── */
function estH(data){
  var h=300; // header block
  SECS.forEach(function(s){
    var items=(data[s.k]||[]).filter(function(i){return i.sr||i.f;});
    if(!items.length)return;
    h+=62; // sec header
    items.forEach(function(it){
      var extra=0;
      if(it.rating||(it.errors&&it.errors!=='0'&&it.errors!==''))extra+=40;
      if(it.nsr||(it.nf&&it.nt))extra+=38;
      h+=24+32+extra+20;
    });
    h+=16;
  });
  return Math.max(h+80,500);
}

/* ── Draw Islamic star pattern (subtle bg decoration) ── */
function drawStarPat(c,cx2,cy2,r,col,alpha){
  c.save();c.globalAlpha=alpha;c.strokeStyle=col;c.lineWidth=1;
  var pts=[];
  for(var i=0;i<8;i++){var a=i*Math.PI/4;pts.push([cx2+r*Math.cos(a),cy2+r*Math.sin(a)]);}
  c.beginPath();
  for(var j=0;j<8;j++){c.moveTo(cx2,cy2);c.lineTo(pts[j][0],pts[j][1]);}
  c.stroke();
  c.beginPath();c.arc(cx2,cy2,r*0.4,0,Math.PI*2);c.stroke();
  c.restore();
}

/* ── Draw pill badge ── */
function pill(c,txt,rx,ry,col,fs){
  c.font='bold '+fs+'px Cairo,sans-serif';
  var tw=c.measureText(txt).width, ph=fs+14, pw=tw+24;
  rrect(c,rx-pw,ry,pw,ph,ph/2);
  c.fillStyle=col.bg;c.fill();
  c.strokeStyle=col.brd;c.lineWidth=1.5;c.stroke();
  c.fillStyle=col.fg;c.textAlign='right';c.textBaseline='middle';
  c.fillText(txt,rx-12,ry+ph/2);
  return pw+10;
}

/* ══ MAIN DRAW ══ */
async function drawCard(nm,data){
  var H=estH(data);
  var canvas=document.createElement('canvas');
  canvas.width=CW*DPR; canvas.height=H*DPR;
  var c=canvas.getContext('2d');
  c.scale(DPR,DPR);

  /* ── 1. DEEP DARK BACKGROUND ── */
  var bgG=c.createLinearGradient(0,0,0,H);
  bgG.addColorStop(0,'#030d08');bgG.addColorStop(0.4,'#061510');bgG.addColorStop(1,'#020a05');
  c.fillStyle=bgG;c.fillRect(0,0,CW,H);

  /* subtle grid lines */
  c.save();c.globalAlpha=0.04;c.strokeStyle='#4ade80';c.lineWidth=1;
  for(var gx=0;gx<CW;gx+=60){c.beginPath();c.moveTo(gx,0);c.lineTo(gx,H);c.stroke();}
  for(var gy=0;gy<H;gy+=60){c.beginPath();c.moveTo(0,gy);c.lineTo(CW,gy);c.stroke();}
  c.restore();

  /* corner star ornaments */
  drawStarPat(c,60,60,45,'#d4af53',0.18);
  drawStarPat(c,CW-60,60,45,'#d4af53',0.18);
  drawStarPat(c,60,H-60,35,'#d4af53',0.10);
  drawStarPat(c,CW-60,H-60,35,'#d4af53',0.10);

  /* ── 2. HEADER BLOCK ── */
  var HDR=240;

  /* glowing radial behind mosque */
  var glow=c.createRadialGradient(CW/2,HDR/2,20,CW/2,HDR/2,160);
  glow.addColorStop(0,'rgba(52,211,153,0.22)');
  glow.addColorStop(0.5,'rgba(16,185,129,0.08)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=glow;c.fillRect(0,0,CW,HDR+40);

  /* gold top bar */
  var topBar=c.createLinearGradient(0,0,CW,0);
  topBar.addColorStop(0,'transparent');topBar.addColorStop(0.2,'#d4af53');
  topBar.addColorStop(0.5,'#fcd34d');topBar.addColorStop(0.8,'#d4af53');topBar.addColorStop(1,'transparent');
  c.fillStyle=topBar;c.fillRect(0,0,CW,4);

  /* mosque */
  c.font='72px serif';c.textAlign='center';c.textBaseline='top';c.fillText('🕌',CW/2,12);

  /* center name with glow */
  c.save();
  c.shadowColor='#34d399';c.shadowBlur=30;
  c.font='900 36px Cairo,sans-serif';
  var tg=c.createLinearGradient(CW*0.2,0,CW*0.8,0);
  tg.addColorStop(0,'#a7f3d0');tg.addColorStop(0.4,'#fcd34d');tg.addColorStop(0.7,'#fbbf24');tg.addColorStop(1,'#a7f3d0');
  c.fillStyle=tg;c.textAlign='center';c.textBaseline='top';
  c.fillText('مركز خادم القرآن الكريم',CW/2,92);
  c.restore();

  /* decorative line under title */
  var dl=c.createLinearGradient(PAD,0,CW-PAD,0);
  dl.addColorStop(0,'transparent');dl.addColorStop(0.3,'#d4af53');dl.addColorStop(0.7,'#d4af53');dl.addColorStop(1,'transparent');
  c.strokeStyle=dl;c.lineWidth=1.5;c.setLineDash([]);
  c.beginPath();c.moveTo(PAD*3,138);c.lineTo(CW-PAD*3,138);c.stroke();

  c.font='15px Cairo,sans-serif';c.fillStyle='rgba(167,243,208,0.7)';
  c.textAlign='center';c.textBaseline='top';
  c.fillText('تحت إشراف الشيخ عبدالرحمن',CW/2,146);

  /* ── 3. HERO NAME BADGE ── */
  var BY=172, BH=54;
  /* outer glow */
  c.save();
  c.shadowColor='#fbbf24';c.shadowBlur=40;
  rrect(c,PAD,BY,CW-PAD*2,BH,16);
  c.fillStyle='rgba(251,191,36,0.15)';c.fill();
  c.restore();
  /* gradient fill */
  var bdG=c.createLinearGradient(PAD,BY,CW-PAD,BY+BH);
  bdG.addColorStop(0,'#92400e');bdG.addColorStop(0.25,'#d97706');
  bdG.addColorStop(0.5,'#fcd34d');bdG.addColorStop(0.75,'#d97706');bdG.addColorStop(1,'#92400e');
  rrect(c,PAD,BY,CW-PAD*2,BH,16);
  c.fillStyle=bdG;c.fill();
  /* shimmer border */
  c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=2;c.stroke();
  /* icons */
  c.font='28px serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText('🏆',PAD+40,BY+BH/2);
  c.fillText('⭐',CW-PAD-40,BY+BH/2);
  /* name */
  c.font='900 24px Cairo,sans-serif';c.fillStyle='#1c0700';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('بطلنا  ✦  '+nm,CW/2,BY+BH/2);

  /* ── 4. HIJRI DATE STRIP ── */
  var DY=BY+BH+10, DH=38;
  var dBg=c.createLinearGradient(0,DY,CW,DY+DH);
  dBg.addColorStop(0,'#052e16');dBg.addColorStop(0.5,'#065f46');dBg.addColorStop(1,'#052e16');
  c.fillStyle=dBg;c.fillRect(0,DY,CW,DH);
  c.strokeStyle='#34d399';c.lineWidth=1.5;
  c.beginPath();c.moveTo(0,DY);c.lineTo(CW,DY);c.stroke();
  c.beginPath();c.moveTo(0,DY+DH);c.lineTo(CW,DY+DH);c.stroke();
  c.font='bold 16px Cairo,sans-serif';c.fillStyle='#6ee7b7';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('🗓  '+getHijri(),CW/2,DY+DH/2);

  /* ── 5. SECTIONS ── */
  var cy=DY+DH+20;

  SECS.forEach(function(sec){
    var items=(data[sec.k]||[]).filter(function(i){return i.sr||i.f;});
    if(!items.length)return;

    /* ── section header ── */
    var SH=52;
    /* bg glow */
    c.save();
    c.shadowColor=sec.ac;c.shadowBlur=20;
    rrect(c,PAD,cy,CW-PAD*2,SH,14);
    var shG=c.createLinearGradient(PAD,cy,CW-PAD,cy+SH);
    shG.addColorStop(0,sec.c1);shG.addColorStop(0.6,sec.c2);shG.addColorStop(1,sec.c1);
    c.fillStyle=shG;c.fill();
    c.restore();
    /* border */
    rrect(c,PAD,cy,CW-PAD*2,SH,14);
    c.strokeStyle=sec.ac;c.lineWidth=1.5;c.stroke();
    /* right accent bar */
    rrect(c,CW-PAD-10,cy,10,SH,5);c.fillStyle=sec.ac;c.fill();
    /* icon + label */
    c.font='24px serif';c.textAlign='right';c.textBaseline='middle';
    c.fillText(sec.ico,CW-PAD-20,cy+SH/2);
    c.font='bold 20px Cairo,sans-serif';c.fillStyle=sec.fg;
    c.textAlign='right';c.textBaseline='middle';
    c.fillText(sec.lbl,CW-PAD-54,cy+SH/2);

    cy+=SH+10;

    /* ── items ── */
    items.forEach(function(it){
      var hasMeta=!!(it.rating||(it.errors&&it.errors!=='0'&&it.errors!==''));
      var hasPlan=!!(it.nsr||(it.nf&&it.nt));
      var IH=20+34+(hasMeta?40:0)+(hasPlan?38:0)+20;

      /* card with glow */
      c.save();
      c.shadowColor=sec.dot;c.shadowBlur=16;c.shadowOffsetY=4;
      rrect(c,PAD,cy,CW-PAD*2,IH,14);
      /* dark card bg with subtle tint */
      var cBg=c.createLinearGradient(PAD,cy,CW-PAD,cy+IH);
      cBg.addColorStop(0,'#0a1a0f');cBg.addColorStop(1,'#0d2016');
      c.fillStyle=cBg;c.fill();
      c.restore();
      /* card border */
      rrect(c,PAD,cy,CW-PAD*2,IH,14);
      c.strokeStyle=sec.dot;c.lineWidth=1.5;c.stroke();
      /* right accent thick */
      rrect(c,CW-PAD-10,cy,10,IH,5);c.fillStyle=sec.ac;c.fill();
      /* left thin tint */
      rrect(c,PAD,cy,5,IH,3);c.fillStyle=sec.c2+'55';c.fill();

      var RX=CW-PAD-22, ty=cy+18;

      /* main label */
      var lbl='';
      if(it.sr){lbl=it.sr+(it.type==='range'?'  —  من آية '+it.f+' إلى آية '+it.t:'  كاملة');}
      else{var isRq=(sec.k==='sj'||sec.k==='hd');var u=isRq?'رقم':'سؤال';lbl='من '+u+' '+it.f+'  ←  إلى '+u+' '+it.t;}
      c.font='bold 20px Cairo,sans-serif';c.fillStyle=sec.fg;
      c.textAlign='right';c.textBaseline='top';c.fillText(lbl,RX,ty);
      ty+=34;

      /* badges */
      if(hasMeta){
        var bx=RX;
        if(it.rating){var rc=rCol(it.rating);bx-=pill(c,it.rating,bx,ty,rc,14);}
        if(it.errors&&it.errors!=='0'&&it.errors!==''){
          pill(c,'❌ '+it.errors+' خطأ',bx,ty,{bg:'#450a0a',fg:'#fca5a5',brd:'#dc2626'},14);
        }
        ty+=40;
      }

      /* next plan */
      if(hasPlan){
        rrect(c,PAD+12,ty-2,CW-PAD*2-24,34,9);
        var pBg=c.createLinearGradient(PAD+12,ty,CW-PAD-12,ty+34);
        pBg.addColorStop(0,sec.c1);pBg.addColorStop(1,sec.c2+'88');
        c.fillStyle=pBg;c.fill();
        c.strokeStyle=sec.ac;c.lineWidth=1;c.setLineDash([5,3]);c.stroke();c.setLineDash([]);
        var nxt='';
        if(it.nsr){nxt='🎯 القادم:  '+it.nsr+(it.ntype==='range'?' — آية '+it.nf+' إلى آية '+it.nt:'  كاملة');}
        else{var isRq2=(sec.k==='sj'||sec.k==='hd');var u2=isRq2?'رقم':'سؤال';nxt='🎯 القادم:  من '+u2+' '+it.nf+'  ←  إلى '+u2+' '+it.nt;}
        c.font='bold 15px Cairo,sans-serif';c.fillStyle=sec.ac;
        c.textAlign='right';c.textBaseline='middle';c.fillText(nxt,RX,ty+17);
      }

      cy+=IH+10;
    });
    cy+=12;
  });

  /* ── 6. FOOTER ── */
  var FH=64;
  var fBg=c.createLinearGradient(0,cy,CW,cy+FH);
  fBg.addColorStop(0,'#030d08');fBg.addColorStop(0.5,'#052e16');fBg.addColorStop(1,'#030d08');
  c.fillStyle=fBg;c.fillRect(0,cy,CW,FH);

  /* gold border top */
  var fLine=c.createLinearGradient(0,cy,CW,cy);
  fLine.addColorStop(0,'transparent');fLine.addColorStop(0.3,'#d4af53');
  fLine.addColorStop(0.7,'#d4af53');fLine.addColorStop(1,'transparent');
  c.strokeStyle=fLine;c.lineWidth=2;c.setLineDash([]);
  c.beginPath();c.moveTo(0,cy);c.lineTo(CW,cy);c.stroke();

  c.font='bold 15px Cairo,sans-serif';c.fillStyle='#d4af53';
  c.textAlign='right';c.textBaseline='middle';
  c.fillText('مركز خادم القرآن الكريم',CW-PAD,cy+FH/2);
  c.font='26px serif';c.textAlign='center';c.textBaseline='middle';
  c.fillText('⭐ ⭐ ⭐',CW/2,cy+FH/2);
  c.font='13px Cairo,sans-serif';c.fillStyle='rgba(167,243,208,0.4)';
  c.textAlign='left';c.textBaseline='middle';
  c.fillText('تقرير متابعة الحفظ',PAD,cy+FH/2);

  /* bottom gold bar */
  c.fillStyle=fLine;
  var botBar=c.createLinearGradient(0,cy+FH-3,CW,cy+FH);
  botBar.addColorStop(0,'transparent');botBar.addColorStop(0.2,'#d4af53');
  botBar.addColorStop(0.8,'#d4af53');botBar.addColorStop(1,'transparent');
  c.fillStyle=botBar;c.fillRect(0,cy+FH-3,CW,3);

  return canvas;
}

/* ─────────── MODAL ─────────── */
function showModal(src,nm){
  var m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px;overflow-y:auto;gap:14px';
  m.innerHTML='<img src="'+src+'" style="max-width:100%;max-height:72vh;border-radius:16px;box-shadow:0 0 60px rgba(52,211,153,0.3)">'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">'
    +'<button id="mc" style="padding:12px 32px;background:#d4af53;color:#030d08;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;font-family:Cairo,sans-serif">إغلاق</button>'
    +'<button id="ms" style="padding:12px 32px;background:#052e16;color:#34d399;border:2px solid #34d399;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;font-family:Cairo,sans-serif">💾 حفظ بطاقة البطل</button>'
    +'</div>';
  document.body.appendChild(m);
  m.querySelector('#mc').onclick=function(){m.remove();};
  m.querySelector('#ms').onclick=function(){
    var a=document.createElement('a');a.href=src;a.download='بطاقة_البطل_'+(nm||'')+'.png';a.click();
  };
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
}

/* ─────────── GENERATE ─────────── */
async function generateAndShare(){
  var nm=document.getElementById('inp-student').value.trim();
  if(!nm){alert('يرجى إدخال اسم البطل');return;}
  var data={
    ns:collect('new-surahs',false),ps:collect('past-surahs',false),
    mq:collect('mur-questions',true),pm:collect('past-mur',true),
    sj:collect('suraj-section',true),hd:collect('hadith-section',true)
  };
  try{
    var canvas=await drawCard(nm,data);
    var img=canvas.toDataURL('image/png');
    localStorage.setItem('rep_img_'+nm,img);
    localStorage.setItem('rep_'+nm,JSON.stringify(data));
    if(navigator.share&&navigator.canShare){
      try{
        var blob=await (await fetch(img)).blob();
        var file=new File([blob],'بطاقة_البطل_'+nm+'.png',{type:'image/png'});
        if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'بطاقة البطل — '+nm});return;}
      }catch(e){}
    }
    showModal(img,nm);
  }catch(e){alert('خطأ: '+e.message);}
}

function loadStudentData(){
  var nm=document.getElementById('inp-student').value.trim();
  if(!nm){alert('يرجى إدخال اسم البطل أولاً');return;}
  var img=localStorage.getItem('rep_img_'+nm);
  if(!img){alert('لا يوجد تقرير سابق لهذا البطل');return;}
  showModal(img,nm);
}

/* ─────────── INIT ─────────── */
addSurah('new-surahs','ns',true,true);
addSurah('past-surahs','ps',true,false);
addQuestion('mur-questions','mq',true,true);
addQuestion('past-mur','pm',true,false);
addQuestion('suraj-section','sj',true,true);
addQuestion('hadith-section','hd',true,true);
</script>
