<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الإسلامية - المصحف الشريف والأحاديث</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a84c',
                        'gold-dark': '#a68a3e',
                        'gold-light': '#e8d5a3',
                        cream: '#f5f0e8',
                        'cream-dark': '#e8dfc8',
                        parchment: '#f0e6d0',
                        ink: '#2c1810',
                        'deep-green': '#0d3320',
                        'dark-bg': '#0a0f0d',
                        'dark-card': '#121a16',
                        'dark-border': '#1e2e25',
                    },
                    fontFamily: {
                        quran: ['"Amiri Quran"', 'serif'],
                        amiri: ['Amiri', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: #0a0f0d;
            color: #e8d5a3;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === خلفية مزخرفة === */
        .bg-pattern {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(201,168,76,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 80% 70%, rgba(13,51,32,0.15) 0%, transparent 70%),
                radial-gradient(circle 300px at 50% 50%, rgba(201,168,76,0.03) 0%, transparent 100%);
        }
        .bg-pattern::before {
            content: '';
            position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        /* === تأثير الكتاب ثلاثي الأبعاد === */
        .book-scene {
            perspective: 2200px;
            perspective-origin: 50% 50%;
        }
        .book-container {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        .book-container:hover {
            transform: rotateY(-1deg) rotateX(1deg);
        }

        /* === الصفحات === */
        .book-spread {
            display: flex;
            position: relative;
            border-radius: 4px 12px 12px 4px;
            overflow: hidden;
            box-shadow:
                0 2px 8px rgba(0,0,0,0.3),
                0 8px 30px rgba(0,0,0,0.4),
                0 20px 60px rgba(0,0,0,0.3),
                inset 0 0 0 1px rgba(201,168,76,0.1);
        }
        .page-side {
            width: 50%;
            min-height: 600px;
            position: relative;
            overflow: hidden;
        }
        .page-right-side {
            background: linear-gradient(135deg, #f7f2e8 0%, #f0e8d4 40%, #ebe0c8 100%);
            border-left: 2px solid rgba(0,0,0,0.08);
            border-radius: 0 12px 12px 0;
        }
        .page-left-side {
            background: linear-gradient(225deg, #f7f2e8 0%, #f0e8d4 40%, #ebe0c8 100%);
            border-right: 1px solid rgba(0,0,0,0.05);
            border-radius: 4px 0 0 4px;
        }
        /* خط وسط الكتاب */
        .page-right-side::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 30px;
            background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
        }
        .page-left-side::before {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0; width: 20px;
            background: linear-gradient(to left, rgba(0,0,0,0.04), transparent);
            pointer-events: none;
        }

        /* === تأثير التقليب === */
        .flip-page {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            z-index: 100;
            transition: transform 0.9s cubic-bezier(0.4, 0.0, 0.2, 1);
            pointer-events: none;
        }
        .flip-page.flipping-forward {
            right: 0;
            transform: rotateY(0deg);
        }
        .flip-page.flipping-forward.flip-active {
            transform: rotateY(-180deg);
        }
        .flip-page.flipping-backward {
            right: 0;
            transform: rotateY(-180deg);
        }
        .flip-page.flipping-backward.flip-active {
            transform: rotateY(0deg);
        }
        .flip-front, .flip-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
        }
        .flip-front {
            background: linear-gradient(135deg, #f7f2e8 0%, #f0e8d4 40%, #ebe0c8 100%);
            border-left: 2px solid rgba(0,0,0,0.08);
            border-radius: 0 12px 12px 0;
        }
        .flip-front::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 30px;
            background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
        }
        .flip-back {
            background: linear-gradient(225deg, #f7f2e8 0%, #f0e8d4 40%, #ebe0c8 100%);
            border-right: 1px solid rgba(0,0,0,0.05);
            border-radius: 4px 0 0 4px;
            transform: rotateY(180deg);
        }
        .flip-back::before {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0; width: 20px;
            background: linear-gradient(to left, rgba(0,0,0,0.04), transparent);
        }
        /* ظل متحرك أثناء التقليب */
        .flip-shadow {
            position: absolute;
            top: 0; width: 60px; height: 100%;
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .flip-shadow-right {
            left: 50%;
            background: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
        }
        .flip-shadow-left {
            left: calc(50% - 60px);
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
        }
        .is-flipping .flip-shadow { opacity: 1; }

        /* === نص المصحف === */
        .quran-text {
            font-family: 'Amiri Quran', serif;
            font-size: 1.65rem;
            line-height: 2.8;
            color: #2c1810;
            direction: rtl;
            text-align: justify;
            padding: 30px 35px 30px 40px;
        }
        .ayah-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px; height: 26px;
            font-family: 'Amiri', serif;
            font-size: 0.65rem;
            color: #c9a84c;
            border: 1px solid #c9a84c;
            border-radius: 50%;
            margin: 0 2px;
            vertical-align: middle;
            background: rgba(201,168,76,0.05);
        }
        .surah-header {
            text-align: center;
            padding: 15px 20px 10px;
            font-family: 'Amiri Quran', serif;
            font-size: 1.8rem;
            color: #1a3c2a;
            position: relative;
        }
        .surah-header::after {
            content: '';
            display: block;
            width: 60%;
            height: 2px;
            background: linear-gradient(to right, transparent, #c9a84c, transparent);
            margin: 8px auto 0;
        }
        .bismillah {
            text-align: center;
            font-family: 'Amiri Quran', serif;
            font-size: 1.5rem;
            color: #1a3c2a;
            padding: 5px 0 10px;
        }
        .page-number {
            position: absolute;
            bottom: 12px;
            font-family: 'Amiri', serif;
            font-size: 0.8rem;
            color: #8a7a60;
        }
        .page-number-right { left: 20px; }
        .page-number-left { right: 20px; }
        .juz-mark {
            display: inline-block;
            background: rgba(26,60,42,0.1);
            color: #1a3c2a;
            font-family: 'Amiri', serif;
            font-size: 0.75rem;
            padding: 1px 8px;
            border-radius: 3px;
            margin: 0 4px;
        }

        /* === شريط التقدم === */
        .progress-bar {
            height: 4px;
            background: rgba(201,168,76,0.15);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #e8d5a3);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* === الأزرار === */
        .nav-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 1.5px solid rgba(201,168,76,0.3);
            background: rgba(10,15,13,0.8);
            color: #c9a84c;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            font-size: 1.1rem;
        }
        .nav-btn:hover {
            background: rgba(201,168,76,0.15);
            border-color: #c9a84c;
            transform: scale(1.1);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* === التبويبات === */
        .tab-btn {
            padding: 12px 32px;
            border-radius: 8px 8px 0 0;
            border: 1.5px solid rgba(201,168,76,0.15);
            border-bottom: none;
            background: rgba(18,26,22,0.6);
            color: rgba(201,168,76,0.5);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .tab-btn.active {
            background: rgba(201,168,76,0.12);
            color: #c9a84c;
            border-color: rgba(201,168,76,0.4);
        }
        .tab-btn:hover:not(.active) {
            color: rgba(201,168,76,0.7);
            background: rgba(201,168,76,0.05);
        }

        /* === فهرس السور === */
        .surah-item {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }
        .surah-item:hover {
            background: rgba(201,168,76,0.08);
            border-color: rgba(201,168,76,0.15);
        }
        .surah-number-badge {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 50%;
            font-size: 0.75rem;
            color: #c9a84c;
            flex-shrink: 0;
        }

        /* === الأحاديث === */
        .hadith-card {
            background: linear-gradient(135deg, #f7f2e8, #f0e8d4, #ebe0c8);
            border-radius: 0 12px 12px 0;
            color: #2c1810;
            position: relative;
            overflow: hidden;
        }
        .hadith-card-left {
            background: linear-gradient(225deg, #f7f2e8, #f0e8d4, #ebe0c8);
            border-radius: 4px 0 0 4px;
            color: #2c1810;
            position: relative;
            overflow: hidden;
        }
        .hadith-text {
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            line-height: 2.4;
            color: #2c1810;
            text-align: justify;
        }
        .hadith-narrator {
            font-family: 'Amiri', serif;
            font-size: 1rem;
            color: #1a3c2a;
            font-weight: 700;
        }
        .hadith-number {
            font-family: 'Amiri', serif;
            font-size: 0.8rem;
            color: #c9a84c;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.3);
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .hadith-source {
            font-size: 0.85rem;
            color: #8a7a60;
            font-family: 'Amiri', serif;
        }
        .decoration-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #c9a84c, transparent);
            margin: 12px 0;
        }

        /* === Loading === */
        .loader {
            width: 50px; height: 50px;
            border: 3px solid rgba(201,168,76,0.15);
            border-top-color: #c9a84c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === Toast === */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(18,26,22,0.95);
            border: 1px solid rgba(201,168,76,0.3);
            color: #e8d5a3;
            padding: 12px 28px;
            border-radius: 10px;
            font-family: 'Amiri', serif;
            font-size: 0.95rem;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(12px);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* === سكرول بار مخصص === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.5); }

        /* === الأنيميشن === */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease forwards; }

        /* === تجاوب === */
        @media (max-width: 900px) {
            .book-spread { flex-direction: column; }
            .page-side { width: 100%; min-height: 500px; }
            .page-right-side { border-left: none; border-radius: 12px 12px 0 0; }
            .page-left-side { border-right: none; border-radius: 0 0 12px 12px; }
            .quran-text { font-size: 1.3rem; padding: 20px 25px; }
            .flip-page { display: none; }
        }
        @media (max-width: 640px) {
            .quran-text { font-size: 1.1rem; line-height: 2.4; padding: 15px 18px; }
            .page-side { min-height: 420px; }
        }

        /* === تأثير توهج ذهبي === */
        .gold-glow {
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
        }

        /* === فهرس جانبي === */
        .sidebar-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
        .sidebar-panel {
            position: fixed;
            top: 0; right: -380px;
            width: 360px; height: 100vh;
            background: rgba(12,18,14,0.97);
            border-left: 1px solid rgba(201,168,76,0.15);
            z-index: 501;
            transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }
        .sidebar-panel.open { right: 0; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية مزخرفة -->
    <div class="bg-pattern"></div>

    <!-- شريط التنقل الرئيسي -->
    <nav class="relative z-50 border-b border-dark-border" style="background: rgba(10,15,13,0.9); backdrop-filter: blur(16px);">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <!-- الشعار -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05)); border: 1px solid rgba(201,168,76,0.3);">
                    <i class="fas fa-quran text-gold text-lg"></i>
                </div>
                <div>
                    <h1 class="text-gold font-bold text-lg leading-tight" style="font-family: 'Amiri', serif;">المكتبة الإسلامية</h1>
                    <p class="text-xs" style="color: rgba(201,168,76,0.4);">المصحف الشريف والأحاديث النبوية</p>
                </div>
            </div>
            <!-- تبويبات الصفحات -->
            <div class="flex gap-1">
                <button onclick="showSection('quran')" id="tab-quran" class="tab-btn active">
                    <i class="fas fa-book-quran ml-2"></i>المصحف الشريف
                </button>
                <button onclick="showSection('hadith')" id="tab-hadith" class="tab-btn">
                    <i class="fas fa-book-open ml-2"></i>الأحاديث النبوية
                </button>
            </div>
        </div>
    </nav>

    <!-- ===================== قسم المصحف ===================== -->
    <section id="section-quran" class="relative z-10">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <!-- شريط الأدوات العلوي -->
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="nav-btn" title="فهرس السور" aria-label="فتح فهرس السور">
                        <i class="fas fa-list"></i>
                    </button>
                    <div>
                        <span id="current-surah-name" class="text-gold font-bold text-lg">الفاتحة</span>
                        <span id="current-page-info" class="block text-xs" style="color: rgba(201,168,76,0.5);">الصفحة 1 من 604</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="goToPage()" class="nav-btn" title="الذهاب لصفحة" aria-label="الذهاب لصفحة محددة">
                        <i class="fas fa-hashtag"></i>
                    </button>
                    <button onclick="toggleSound()" id="sound-btn" class="nav-btn" title="كتم/تشغيل الصوت" aria-label="كتم أو تشغيل صوت التقليب">
                        <i class="fas fa-volume-high"></i>
                    </button>
                </div>
            </div>

            <!-- شريط التقدم -->
            <div class="progress-bar mb-6" onclick="handleProgressClick(event)" role="progressbar" aria-label="شريط تقدم القراءة">
                <div class="progress-fill" id="quran-progress" style="width: 0.3%"></div>
            </div>

            <!-- الكتاب -->
            <div class="book-scene flex justify-center">
                <div class="book-container" id="quran-book">
                    <div class="book-spread" id="book-spread" style="width: 820px; max-width: 100%;">
                        <!-- الصفحة اليمنى -->
                        <div class="page-side page-right-side" id="page-right">
                            <div class="quran-text" id="right-content">
                                <div class="flex items-center justify-center h-full">
                                    <div class="loader"></div>
                                </div>
                            </div>
                            <span class="page-number page-number-right" id="page-num-right">1</span>
                        </div>
                        <!-- الصفحة اليسرى -->
                        <div class="page-side page-left-side" id="page-left">
                            <div class="quran-text" id="left-content">
                                <div class="flex items-center justify-center h-full">
                                    <div class="loader"></div>
                                </div>
                            </div>
                            <span class="page-number page-number-left" id="page-num-left">2</span>
                        </div>
                        <!-- ظل التقليب -->
                        <div class="flip-shadow flip-shadow-right" id="shadow-r"></div>
                        <div class="flip-shadow flip-shadow-left" id="shadow-l"></div>
                    </div>
                </div>
            </div>

            <!-- أزرار التنقل -->
            <div class="flex items-center justify-center gap-8 mt-6">
                <button onclick="flipPrev()" class="nav-btn" id="btn-prev" disabled aria-label="الصفحة السابقة">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <span id="page-indicator" class="text-gold font-bold text-xl" style="font-family: 'Amiri', serif; min-width: 80px; text-align: center;">1 - 2</span>
                <button onclick="flipNext()" class="nav-btn" id="btn-next" aria-label="الصفحة التالية">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- ===================== قسم الأحاديث ===================== -->
    <section id="section-hadith" class="relative z-10 hidden">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <!-- تبويبات البخاري ومسلم -->
            <div class="flex gap-1 mb-6">
                <button onclick="switchHadithBook('bukhari')" id="htab-bukhari" class="tab-btn active" style="border-radius: 8px 8px 0 0;">
                    <i class="fas fa-book ml-2"></i>صحيح البخاري
                </button>
                <button onclick="switchHadithBook('muslim')" id="htab-muslim" class="tab-btn" style="border-radius: 8px 8px 0 0;">
                    <i class="fas fa-book ml-2"></i>صحيح مسلم
                </button>
            </div>

            <!-- الكتاب -->
            <div class="book-scene flex justify-center">
                <div class="book-container">
                    <div class="book-spread" id="hadith-spread" style="width: 820px; max-width: 100%;">
                        <div class="page-side page-right-side hadith-card" id="hadith-right">

    const BUKHARI_HADITHS = [
        {num:1, text:"إنَّما الأعْمالُ بالنِّيّاتِ، وإنَّما لِكُلِّ امْرِئٍ ما نَوَى، فمَن كانَتْ هِجْرَتُهُ إلى اللَّهِ ورَسولِهِ فَهِجْرَتُهُ إلى اللَّهِ ورَسولِهِ، ومَن كانَتْ هِجْرَتُهُ لِدُنْيا يُصِيبُها أوِ امْرَأَةٍ يَنْكِحُها فَهِجْرَتُهُ إلى ما هاجَرَ إلَيْهِ.", narrator:"عمر بن الخطاب رضي الله عنه", chapter:"كتاب بدء الوحي"},
        {num:2, text:"مَن كانَ يُؤْمِنُ باللَّهِ واليَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أوْ لِيَصْمُتْ، ومَن كانَ يُؤْمِنُ باللَّهِ واليَوْمِ الآخِرِ فَلْيُكْرِمْ جارَهُ، ومَن كانَ يُؤْمِنُ باللَّهِ واليَوْمِ الآخِرِ فَلْيُكْرِمْ ضَيْفَهُ.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب الإيمان"},
        {num:3, text:"لا يُؤْمِنُ أحَدُكُمْ حتَّى يُحِبَّ لأخِيهِ ما يُحِبُّ لِنَفْسِهِ.", narrator:"أنس بن مالك رضي الله عنه", chapter:"كتاب الإيمان"},
        {num:8, text:"الْمُسْلِمُ مَن سَلِمَ المُسْلِمُونَ مِن لِسانِهِ ويَدِهِ، والْمُهاجِرُ مَن هَجَرَ ما نَهَى اللَّهُ عنْهُ.", narrator:"عبد الله بن عمرو رضي الله عنهما", chapter:"كتاب الإيمان"},
        {num:13, text:"أُمِرْتُ أنْ أُقاتِلَ النّاسَ حتَّى يَشْهَدُوا أنْ لا إلَهَ إلَّا اللَّهُ وأنَّ مُحَمَّدًا رَسولُ اللَّهِ، ويُقِيمُوا الصَّلاةَ، ويُؤْتُوا الزَّكاةَ، فإذا فَعَلُوا ذلكَ عَصَمُوا مِنّي دِماءَهُمْ وأمْوالَهُمْ إلَّا بِحَقِّها، وحِسابُهُمْ علَى اللَّهِ.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب الإيمان"},
        {num:27, text:"الإسْلامُ أنْ تَشْهَدَ أنْ لا إلَهَ إلَّا اللَّهُ وأنَّ مُحَمَّدًا رَسولُ اللَّهِ، وتُقِيمَ الصَّلاةَ، وتُؤْتِيَ الزَّكاةَ، وتَصُومَ رَمَضانَ، وتَحُجَّ البَيْتَ إنِ اسْتَطَعْتَ إلَيْهِ سَبيلًا.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب الإيمان"},
        {num:38, text:"مَن صَامَ رَمَضانَ إيمانًا واحْتِسابًا غُفِرَ لَهُ ما تَقَدَّمَ مِن ذَنْبِهِ، ومَن قامَ لَيْلَةَ القَدْرِ إيمانًا واحْتِسابًا غُفِرَ لَهُ ما تَقَدَّمَ مِن ذَنْبِهِ.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب الصيام"},
        {num:47, text:"مَن تَصَدَّقَ بعَدْلِ تَمْرَةٍ مِن كَسْبٍ طَيِّبٍ، ولا يَقْبَلُ اللَّهُ إلَّا الطَّيِّبَ، فإنَّ اللَّهَ يَتَقَبَّلُها بيَمِينِهِ، ثُمَّ يُرَبِّيها لِصاحِبِها كما يُرَبِّي أحَدُكُمْ فَلُوَّهُ حتَّى تَكُونَ مِثْلَ الجَبَلِ.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب الزكاة"},
        {num:52, text:"قالَ اللَّهُ تَعالَى: أنا عِنْدَ ظَنِّ عَبْدِي بِي، وإذا ذَكَرَنِي فِي نَفْسِهِ ذَكَرْتُهُ في نَفْسِي، وإذا ذَكَرَنِي في مَلأٍ ذَكَرْتُهُ في مَلأٍ خَيْرٍ مِنْهُم.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب التوحيد"},
        {num:56, text:"قالَ اللَّهُ عَزَّ وجَلَّ: إذا تَقَرَّبَ العَبْدُ إلَيَّ شِبْرًا تَقَرَّبْتُ إلَيْهِ ذِراعًا، وإذا تَقَرَّبَ إلَيَّ ذِراعًا تَقَرَّبْتُ إلَيْهِ بَاعًا، وإذا أتانِي يَمْشِي أتَيْتُهُ هَرْوَلَةً.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب التوحيد"},
        {num:60, text:"لَوْ يُعْطَى النّاسُ بِدَعْوَاهُمْ لادَّعَى رِجالٌ أمْوالَ قَوْمٍ ودماءَهُمْ، لكنِ البَيِّنَةُ علَى المُدَّعِي واليَمِينُ علَى مَن أنْكَرَ.", narrator:"ابن عباس رضي الله عنهما", chapter:"كتاب الشهادات"},
        {num:87, text:"مَن سَلَكَ طَرِيقًا يَلْتَمِسُ فيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ طَرِيقًا إلى الجَنَّةِ.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب العلم"},
        {num:100, text:"مَن كَتَمَ عِلْمًا يَعْلَمُهُ أُلْجِمَ يَوْمَ القِيامَةِ بِلِجامٍ مِن نارٍ.", narrator:"أبو هريرة رضي الله عنه", chapter:"كتاب العلم"},

    // ============================================================
    //  المتغيرات العامة
    // ============================================================
    let quranPages = {};        // بيانات الصفحات المحملة
    let allAyahs = [];          // كل الآيات
    let currentRightPage = 1;   // الصفحة اليمنى الحالية
    let isFlipping = false;     // هل يتم التقليب الآن
    let soundEnabled = true;    // صوت التقليب
    let audioCtx = null;        // سياق الصوت

    // متغيرات الأحاديث
    let currentHadithBook = 'bukhari';
    let currentHadithPage = 0;
    let isHadithFlipping = false;

    // ============================================================
    //  صوت تقليب الورق (Web Audio API)
    // ============================================================
    function getAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }

    function playFlipSound() {
        if (!soundEnabled) return;
        try {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') ctx.resume();

            const duration = 0.35;
            const bufferSize = Math.floor(ctx.sampleRate * duration);
            const buffer = ctx.createBuffer(2, bufferSize, ctx.sampleRate);

            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / bufferSize;
                    // noise مع envelope يشبه صوت الورق
                    const noise = (Math.random() * 2 - 1);
                    const envelope = Math.exp(-t * 10) * (1 - Math.exp(-t * 50));
                    // إضافة فرق بسيط بين القناتين للستيريو
                    const stereo = ch === 0 ? 1.0 : 0.85;
                    data[i] = noise * envelope * 0.25 * stereo;
                }
            }

            const source = ctx.createBufferSource();
            source.buffer = buffer;

            // فلتر يجعل الصوت أشبه بالورق
            const bandpass = ctx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 3000;
            bandpass.Q.value = 0.5;

            const highpass = ctx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 800;

            const gain = ctx.createGain();
            gain.gain.value = 0.5;

            source.connect(bandpass);
            bandpass.connect(highpass);
            highpass.connect(gain);
            gain.connect(ctx.destination);

            source.start();
            source.stop(ctx.currentTime + duration);
        } catch (e) {
            // تجاهل أخطاء الصوت
        }
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        const icon = document.querySelector('#sound-btn i');
        icon.className = soundEnabled ? 'fas fa-volume-high' : 'fas fa-volume-xmark';
        showToast(soundEnabled ? 'تم تشغيل الصوت' : 'تم كتم الصوت');
    }

    // ============================================================
    //  تحميل بيانات القرآن الكريم
    // ============================================================
    async function loadQuranData() {
        try {
            const response = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
            if (!response.ok) throw new Error('فشل التحميل');
            const result = await response.json();
            allAyahs = result.data.ayahs;

            // تقسيم الآيات حسب الصفحات
            allAyahs.forEach(ayah => {
                const p = ayah.page;
                if (!quranPages[p]) quranPages[p] = [];
                quranPages[p].push(ayah);
            });

            // عرض الصفحات الأولى
            renderPage('right', currentRightPage);
            renderPage('left', currentRightPage + 1);
            updateUI();
            showToast('تم تحميل المصحف الشريف بنجاح');
        } catch (error) {
            console.error('خطأ في تحميل القرآن:', error);
            document.getElementById('right-content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center gap-4">
                    <i class="fas fa-exclamation-triangle text-4xl" style="color: #c9a84c;"></i>
                    <p class="text-lg" style="color: #2c1810;">تعذر تحميل بيانات المصحف</p>
                    <p class="text-sm" style="color: #8a7a60;">تأكد من اتصالك بالإنترنت ثم أعد تحميل الصفحة</p>
                    <button onclick="loadQuranData()" class="mt-2 px-6 py-2 rounded-lg text-sm font-bold" style="background: rgba(26,60,42,0.15); color: #1a3c2a; border: 1px solid rgba(26,60,42,0.2);">إعادة المحاولة</button>
                </div>
            `;
            document.getElementById('left-content').innerHTML = '';
        }
    }

    // ============================================================
    //  عرض صفحة القرآن
    // ============================================================
    function renderPage(side, pageNum) {
        if (pageNum < 1 || pageNum > 604) return;

        const container = document.getElementById(side === 'right' ? 'right-content' : 'left-content');
        const numEl = document.getElementById(side === 'right' ? 'page-num-right' : 'page-num-left');
        numEl.textContent = pageNum;

        const ayahs = quranPages[pageNum];
        if (!ayahs || ayahs.length === 0) {
            container.innerHTML = '<div class="flex items-center justify-center h-full"><div class="loader"></div></div>';
            return;
        }

        let html = '';

        // التحقق من بداية سورة جديدة
        const firstAyah = ayahs[0];
        const surahInfo = SURAHS.find(s => s.n === firstAyah.surah.number);

        // هل هذه أول آية في السورة؟
        if (firstAyah.numberInSurah === 1) {
            // رأس السورة
            html += `<div class="surah-header">
                سورة ${surahInfo ? surahInfo.name : firstAyah.surah.name}
                <div class="text-sm mt-1" style="color: #8a7a60; font-family: Amiri, serif;">
                    ${surahInfo ? surahInfo.type : ''} · ${ayahs.length} آية
                </div>
            </div>`;
            // البسملة (إلا الفاتحة والتوبة)
            if (firstAyah.surah.number !== 9 && firstAyah.surah.number !== 1) {
                html += `<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>`;
            }
        }

        // نص الآيات
        let currentSurah = firstAyah.surah.number;
        ayahs.forEach(ayah => {
            // التحقق من بداية سورة جديدة في منتصف الصفحة
            if (ayah.numberInSurah === 1 && ayah.surah.number !== currentSurah) {
                const sInfo = SURAHS.find(s => s.n === ayah.surah.number);
                html += `<div class="surah-header" style="margin-top: 20px;">
                    سورة ${sInfo ? sInfo.name : ayah.surah.name}
                    <div class="text-sm mt-1" style="color: #8a7a60; font-family: Amiri, serif;">
                        ${sInfo ? sInfo.type : ''} · آياتها ${sInfo ? sInfo.ayas : ''}
                    </div>
                </div>`;
                if (ayah.surah.number !== 9 && ayah.surah.number !== 1) {
                    html += `<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>`;
                }
                currentSurah = ayah.surah.number;
            }

            // إضافة علامة الجزء إذا كانت أول آية في الجزء
            const juzStart = getJuzStart(ayah.juz);
            if (juzStart && juzStart.page === pageNum && juzStart.ayah === ayah.numberInSurah) {
                html += `<span class="juz-mark">الجزء ${toArabicNum(ayah.juz)}</span> `;
            }

            html += `${ayah.text}<span class="ayah-number">${toArabicNum(ayah.numberInSurah)}</span> `;
        });

        container.innerHTML = html;
    }

    // تحديد بداية كل جزء (أول آية في أول صفحة من الجزء)
    function getJuzStart(juzNum) {
        if (!allAyahs.length) return null;
        const firstAyah = allAyahs.find(a => a.juz === juzNum);
        if (!firstAyah) return null;
        return { page: firstAyah.page, ayah: firstAyah.numberInSurah };
    }

    // تحويل الأرقام لعربية
    function toArabicNum(num) {
        const arabic = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
        return String(num).replace(/[0-9]/g, d => arabic[parseInt(d)]);
    }

    // ============================================================
    //  تأثير التقليب ثلاثي الأبعاد
    // ============================================================
    function flipNext() {
        if (isFlipping || currentRightPage >= 603) return;
        isFlipping = true;
        playFlipSound();

        const spread = document.getElementById('book-spread');
        spread.classList.add('is-flipping');

        const oldRightPage = currentRightPage;
        const oldLeftPage = currentRightPage + 1;
        const newRightPage = currentRightPage + 2;
        const newLeftPage = currentRightPage + 3;

        // إنشاء عنصر التقليب
        const flipEl = document.createElement('div');
        flipEl.className = 'flip-page flipping-forward';
        flipEl.innerHTML = `
            <div class="flip-front"><div class="quran-text" id="flip-front-content"></div></div>
            <div class="flip-back"><div class="quran-text" id="flip-back-content"></div></div>
        `;

        // نسخ محتوى الصفحة اليمنى الحالية للواجهة
        const frontContent = document.getElementById('right-content').innerHTML;
        flipEl.querySelector('#flip-front-content').innerHTML = frontContent;

        // تحضير محتوى الصفحة اليسرى الجديدة للخلفية
        if (newLeftPage <= 604) {
            renderPageContent('flip-back-content', newLeftPage);
        } else {
            flipEl.querySelector('#flip-back-content').innerHTML = '<div class="flex items-center justify-center h-full" style="color:#8a7a60;font-family:Amiri,serif;">نهاية المصحف الشريف</div>';
        }

        spread.appendChild(flipEl);

        // تحديث المحتوى خلف صفحة التقليب فوراً
        if (newRightPage <= 604) {
            renderPage('right', newRightPage);
        } else {
            document.getElementById('right-content').innerHTML = '<div class="flex items-center justify-center h-full" style="color:#8a7a60;font-family:Amiri,serif;">نهاية المصحف الشريف</div>';
        }
        if (newLeftPage <= 604) {
            renderPage('left', newLeftPage);
        } else {
            document.getElementById('left-content').innerHTML = '';
        }

        // تحريك التقليب
        requestAnimationFrame(() => {
            flipEl.classList.add('flip-active');
        });

        // بعد انتهاء الأنيميشن
        setTimeout(() => {
            flipEl.remove();
            spread.classList.remove('is-flipping');
            currentRightPage = newRightPage > 604 ? 603 : newRightPage;
            isFlipping = false;
            updateUI();
        }, 950);
    }

    function flipPrev() {
        if (isFlipping || currentRightPage <= 1) return;
        isFlipping = true;
        playFlipSound();

        const spread = document.getElementById('book-spread');
        spread.classList.add('is-flipping');

        const oldRightPage = currentRightPage;
        const newRightPage = currentRightPage - 2;
        const newLeftPage = currentRightPage - 1;

        // إنشاء عنصر التقليب (يعود من اليسار لليمين)
        const flipEl = document.createElement('div');
        flipEl.className = 'flip-page flipping-backward';
        flipEl.innerHTML = `
            <div class="flip-front"><div class="quran-text" id="flip-front-content"></div></div>
            <div class="flip-back"><div class="quran-text" id="flip-back-content"></div></div>
        `;

        // محتوى الواجهة = الصفحة اليمنى الجديدة
        if (newRightPage >= 1) {
            renderPageContent('flip-front-content', newRightPage);
        }
        // محتوى الخلفية = الصفحة اليسرى الجديدة
        if (newLeftPage >= 1) {
            renderPageContent('flip-back-content', newLeftPage);
        }

        spread.appendChild(flipEl);

        // تحديث المحتوى الأساسي خلف صفحة التقليب
        renderPage('right', oldRightPage);
        renderPage('left', oldRightPage + 1 > 604 ? 0 : oldRightPage + 1);

        // تحريك العودة
        requestAnimationFrame(() => {
            flipEl.classList.add('flip-active');
        });

        setTimeout(() => {
            flipEl.remove();
            spread.classList.remove('is-flipping');
            currentRightPage = newRightPage < 1 ? 1 : newRightPage;
            isFlipping = false;
            updateUI();
        }, 950);
    }

    // عرض محتوى صفحة في عنصر محدد (بدون تحديث رقم الصفحة)
    function renderPageContent(elementId, pageNum) {
        const container = document.getElementById(elementId);
        if (!container || pageNum < 1 || pageNum > 604) return;

        const ayahs = quranPages[pageNum];
        if (!ayahs || ayahs.length === 0) {
            container.innerHTML = '<div class="flex items-center justify-center h-full"><div class="loader"></div></div>';
            return;
        }

        let html = '';
        const firstAyah = ayahs[0];
        const surahInfo = SURAHS.find(s => s.n === firstAyah.surah.number);

        if (firstAyah.numberInSurah === 1) {
            html += `<div class="surah-header">
                سورة ${surahInfo ? surahInfo.name : firstAyah.surah.name}
                <div class="text-sm mt-1" style="color: #8a7a60; font-family: Amiri, serif;">
                    ${surahInfo ? surahInfo.type : ''} · ${ayahs.length} آية
                </div>
            </div>`;
            if (firstAyah.surah.number !== 9 && firstAyah.surah.number !== 1) {
                html += `<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>`;
            }
        }

        let currentSurah = firstAyah.surah.number;
        ayahs.forEach(ayah => {
            if (ayah.numberInSurah === 1 && ayah.surah.number !== currentSurah) {
                const sInfo = SURAHS.find(s => s.n === ayah.surah.number);
                html += `<div class="surah-header" style="margin-top: 20px;">
                    سورة ${sInfo ? sInfo.name : ayah.surah.name}
                </div>`;
                if (ayah.surah.number !== 9 && ayah.surah.number !== 1) {
                    html += `<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>`;
                }
                currentSurah = ayah.surah.number;
            }
            html += `${ayah.text}<span class="ayah-number">${toArabicNum(ayah.numberInSurah)}</span> `;
        });

        container.innerHTML = html;
    }

    // ============================================================
    //  تحديث واجهة المستخدم
    // ============================================================
    function updateUI() {
        const rightPage = Math.min(currentRightPage, 604);
        const leftPage = Math.min(currentRightPage + 1, 604);

        document.getElementById('page-indicator').textContent = `${toArabicNum(rightPage)} - ${toArabicNum(leftPage)}`;
        document.getElementById('current-page-info').textContent = `الصفحة ${toArabicNum(rightPage)} من ${toArabicNum(604)}`;

        // شريط التقدم
        const progress = (rightPage / 604) * 100;
        document.getElementById('quran-progress').style.width = progress + '%';

        // أزرار التنقل
        document.getElementById('btn-prev').disabled = currentRightPage <= 1;
        document.getElementById('btn-next').disabled = currentRightPage >= 603;

        // اسم السورة الحالية
        const surah = getCurrentSurah(rightPage);
        document.getElementById('current-surah-name').textContent = surah ? `سورة ${surah.name}` : '';

        // أرقام الصفحات
        document.getElementById('page-num-right').textContent = rightPage;
        document.getElementById('page-num-left').textContent = leftPage <= 604 ? leftPage : '';
    }

    function getCurrentSurah(pageNum) {
        let result = null;
        for (const s of SURAHS) {
            if (s.page <= pageNum) result = s;
            else break;
        }
        return result;
    }

    // ============================================================
    //  التنقل
    // ============================================================
    function goToPage() {
        document.getElementById('page-modal').classList.remove('hidden');
        document.getElementById('page-input').value = '';
        document.getElementById('page-input').focus();
    }

    function confirmGoToPage() {
        const val = parseInt(document.getElementById('page-input').value);
        if (val >= 1 && val <= 604) {
            // التأكد من أن الصفحة يمنى (فردية)
            const target = val % 2 === 0 ? val - 1 : val;
            currentRightPage = target;
            renderPage('right', currentRightPage);
            renderPage('left', currentRightPage + 1 <= 604 ? currentRightPage + 1 : 0);
            updateUI();
            closePageModal();
            showToast(`تم الانتقال إلى صفحة ${toArabicNum(val)}`);
        } else {
            showToast('يرجى إدخال رقم صفحة صحيح (1-604)');
        }
    }

    function closePageModal() {
        document.getElementById('page-modal').classList.add('hidden');
    }

    function handleProgressClick(e) {
        const bar = e.currentTarget;
        const rect = bar.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        const page = Math.max(1, Math.min(604, Math.round(ratio * 604)));
        const target = page % 2 === 0 ? page - 1 : page;
        if (target !== currentRightPage) {
            currentRightPage = target;
            renderPage('right', currentRightPage);
            renderPage('left', currentRightPage + 1 <= 604 ? currentRightPage + 1 : 0);
            updateUI();
        }
    }

    // ============================================================
    //  فهرس السور
    // ============================================================
    function toggleSidebar() {
        const overlay = document.getElementById('sidebar-overlay');
        const panel = document.getElementById('sidebar-panel');
        const isOpen = panel.classList.contains('open');
        if (isOpen) {
            overlay.classList.remove('open');
            panel.classList.remove('open');
        } else {
            overlay.classList.add('open');
            panel.classList.add('open');
            if (!document.getElementById('surah-list').children.length) {
                buildSurahList();
            }
        }
    }

    function buildSurahList() {
        const list = document.getElementById('surah-list');
        list.innerHTML = '';
        SURAHS.forEach(s => {
            const div = document.createElement('div');
            div.className = 'surah-item';
            div.setAttribute('data-name', s.name);
            div.setAttribute('data-num', s.n);
            div.onclick = () => {
                currentRightPage = s.page % 2 === 0 ? s.page - 1 : s.page;
                renderPage('right', currentRightPage);
                renderPage('left', currentRightPage + 1 <= 604 ? currentRightPage + 1 : 0);
                updateUI();
                toggleSidebar();
                showToast(`سورة ${s.name}`);
            };
            div.innerHTML = `
                <span class="surah-number-badge">${toArabicNum(s.n)}</span>
                <div class="flex-1">
                    <div class="text-sm font-bold" style="color: #e8d5a3;">${s.name}</div>
                    <div class="text-xs" style="color: rgba(201,168,76,0.4);">${s.type} · ${toArabicNum(s.ayas)} آية · ص ${toArabicNum(s.page)}</div>
                </div>
                <i class="fas fa-chevron-left text-xs" style="color: rgba(201,168,76,0.2);"></i>
            `;
            list.appendChild(div);
        });
    }

    function filterSurahs() {
        const query = document.getElementById('surah-search').value.trim();
        const items = document.querySelectorAll('.surah-item');
        items.forEach(item => {
            const name = item.getAttribute('data-name');
            const num = item.getAttribute('data-num');
            const match = name.includes(query) || num.includes(query);
            item.style.display = match ? '' : 'none';
        });
    }

    // ============================================================
    //  قسم الأحاديث
    // ============================================================
    function switchHadithBook(book) {
        currentHadithBook = book;
        currentHadithPage = 0;
        document.getElementById('htab-bukhari').classList.toggle('active', book === 'bukhari');
        document.getElementById('htab-muslim').classList.toggle('active', book === 'muslim');
        renderHadithPages();
        updateHadithUI();
    }

    function getHadiths() {
        return currentHadithBook === 'bukhari' ? BUKHARI_HADITHS : MUSLIM_HADITHS;
    }

    function renderHadithPage(contentEl, hadiths, indices) {
        let html = '';
        indices.forEach(idx => {
            if (idx < 0 || idx >= hadiths.length) return;
            const h = hadiths[idx];
            html += `
                <div class="mb-6">
                    <div class="flex items-center justify-between mb-3">
                        <span class="hadith-number">${toArabicNum(h.num)}</span>
                        <span class="hadith-source">${h.chapter}</span>
                    </div>
                    <div class="decoration-line"></div>
                    <p class="hadith-text">${h.text}</p>
                    <div class="decoration-line"></div>
                    <p class="hadith-narrator mt-2"><i class="fas fa-user-circle ml-2" style="color: #c9a84c; opacity: 0.5;"></i>${h.narrator}</p>
                </div>
                ${idx < indices[indices.length - 1] ? '<div style="height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.2),transparent);margin:16px 0;"></div>' : ''}
            `;
        });
        contentEl.innerHTML = html || '<div class="flex items-center justify-center h-full" style="color:#8a7a60;">لا توجد أحاديث</div>';
    }

    function renderHadithPages() {
        const hadiths = getHadiths();
        const perPage = 2;
        const rightIdx = currentHadithPage * perPage;
        const leftIdx = rightIdx + perPage;

        const rightIndices = [];
        for (let i = rightIdx; i < Math.min(rightIdx + perPage, hadiths.length); i++) rightIndices.push(i);

        const leftIndices = [];
        for (let i = leftIdx; i < Math.min(leftIdx + perPage, hadiths.length); i++) leftIndices.push(i);

        renderHadithPage(document.getElementById('hadith-right-content'), hadiths, rightIndices);
        renderHadithPage(document.getElementById('hadith-left-content'), hadiths, leftIndices);

        const totalPages = Math.ceil(hadiths.length / perPage);
        document.getElementById('hadith-num-right').textContent = toArabicNum(currentHadithPage + 1);
        document.getElementById('hadith-num-left').textContent = toArabicNum(Math.min(currentHadithPage + 2, totalPages));
    }

    function updateHadithUI() {
        const hadiths = getHadiths();
        const perPage = 2;
        const totalPages = Math.ceil(hadiths.length / perPage);
        const cur = currentHadithPage + 1;

        document.getElementById('hadith-indicator').textContent = `${toArabicNum(cur)} - ${toArabicNum(Math.min(cur + 1, totalPages))}`;
        document.getElementById('hbtn-prev').disabled = currentHadithPage <= 0;
        document.getElementById('hbtn-next').disabled = currentHadithPage >= totalPages - 2;
    }

    function hadithFlipNext() {
        if (isHadithFlipping) return;
        const hadiths = getHadiths();
        const perPage = 2;
        const totalPages = Math.ceil(hadiths.length / perPage);
        if (currentHadithPage >= totalPages - 2) return;

        isHadithFlipping = true;
        playFlipSound();

        const spread = document.getElementById('hadith-spread');
        spread.classList.add('is-flipping');

        const flipEl = document.createElement('div');
        flipEl.className = 'flip-page flipping-forward';
        flipEl.innerHTML = `
            <div class="flip-front" style="background: linear-gradient(135deg, #f7f2e8, #f0e8d4, #ebe0c8); border-left: 2px solid rgba(0,0,0,0.08); border-radius: 0 12px 12px 0;">
                <div class="p-8" id="hflip-front"></div>
            </div>
            <div class="flip-back" style="background: linear-gradient(225deg, #f7f2e8, #f0e8d4, #ebe0c8); border-right: 1px solid rgba(0,0,0,0.05); border-radius: 4px 0 0 4px; transform: rotateY(180deg);">
                <div class="p-8" id="hflip-back"></div>
            </div>
        `;

        // نسخ المحتوى الحالي
        document.getElementById('hflip-front').innerHTML = document.getElementById('hadith-right-content').innerHTML;

        const newRightIdx = (currentHadithPage + 2) * perPage;
        const newLeftIdx = (currentHadithPage + 3) * perPage;
        const rightIndices = [];
        for (let i = newLeftIdx; i < Math.min(newLeftIdx + perPage, hadiths.length); i++) rightIndices.push(i);
        renderHadithPage(document.getElementById('hflip-back'), hadiths, rightIndices);

        spread.appendChild(flipEl);

        // تحديث المحتوى الأساسي
        currentHadithPage += 2;
        renderHadithPages();

        requestAnimationFrame(() => flipEl.classList.add('flip-active'));

        setTimeout(() => {
            flipEl.remove();
            spread.classList.remove('is-flipping');
            isHadithFlipping = false;
            updateHadithUI();
        }, 950);
    }

    function hadithFlipPrev() {
        if (isHadithFlipping || currentHadithPage <= 0) return;
        isHadithFlipping = true;
        playFlipSound();

        const spread = document.getElementById('hadith-spread');
        spread.classList.add('is-flipping');

        const hadiths = getHadiths();
        const perPage = 2;

        const flipEl = document.createElement('div');
        flipEl.className = 'flip-page flipping-backward';
        flipEl.innerHTML = `
            <div class="flip-front" style="background: linear-gradient(135deg, #f7f2e8, #f0e8d4, #ebe0c8); border-left: 2px solid rgba(0,0,0,0.08); border-radius: 0 12px 12px 0;">
                <div class="p-8" id="hflip-front"></div>
            </div>
            <div class="flip-back" style="background: linear-gradient(225deg, #f7f2e8, #f0e8d4, #ebe0c8); border-right: 1px solid rgba(0,0,0,0.05); border-radius: 4px 0 0 4px; transform: rotateY(180deg);">
                <div class="p-8" id="hflip-back"></div>
            </div>
        `;

        const newRightPage = currentHadithPage - 2;
        const newLeftPage = currentHadithPage - 1;

        const rightIndices = [];
        for (let i = newRightPage * perPage; i < Math.min(newRightPage * perPage + perPage, hadiths.length); i++) rightIndices.push(i);
        renderHadithPage(document.getElementById('hflip-front'), hadiths, rightIndices);

        const leftIndices = [];
        for (let i = newLeftPage * perPage; i < Math.min(newLeftPage * perPage + perPage, hadiths.length); i++) leftIndices.push(i);
        renderHadithPage(document.getElementById('hflip-back'), hadiths, leftIndices);

        spread.appendChild(flipEl);
        currentHadithPage = newRightPage;
        renderHadithPages();

        requestAnimationFrame(() => flipEl.classList.add('flip-active'));

        setTimeout(() => {
            flipEl.remove();
            spread.classList.remove('is-flipping');
            isHadithFlipping = false;
            updateHadithUI();
        }, 950);
    }

    // ============================================================
    //  التبديل بين الأقسام
    // ============================================================
    function showSection(section) {
        document.getElementById('section-quran').classList.toggle('hidden', section !== 'quran');
        document.getElementById('section-hadith').classList.toggle('hidden', section !== 'hadith');
        document.getElementById('tab-quran').classList.toggle('active', section === 'quran');
        document.getElementById('tab-hadith').classList.toggle('active', section === 'hadith');
    }

    // ============================================================
    //  Toast
    // ============================================================
    let toastTimer = null;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ============================================================
    //  لوحة المفاتيح
    // ============================================================
    document.addEventListener('keydown', (e) => {
        const quranVisible = !document.getElementById('section-quran').classList.contains('hidden');
        const hadithVisible = !document.getElementById('section-hadith').classList.contains('hidden');

        if (e.key === 'ArrowLeft') {
            if (quranVisible) flipNext();
            else if (hadithVisible) hadithFlipNext();
        } else if (e.key === 'ArrowRight') {
            if (quranVisible) flipPrev();
            else if (hadithVisible) hadithFlipPrev();
        } else if (e.key === 'Escape') {
            closePageModal();
            if (document.getElementById('sidebar-panel').classList.contains('open')) toggleSidebar();
        }
    });

    // ============================================================
    //  دعم اللمس (سحب لتقليب الصفحات)
    // ============================================================
    let touchStartX = 0;
    let touchStartY = 0;

    document.getElementById('book-spread').addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.getElementById('book-spread').addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
            if (dx < 0) flipNext();   // سحب لليسار = الصفحة التالية
            else flipPrev();           // سحب لليمين = الصفحة السابقة
        }
    }, { passive: true });

    // نفس الشيء للأحاديث
    document.getElementById('hadith-spread').addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.getElementById('hadith-spread').addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
            if (dx < 0) hadithFlipNext();
            else hadithFlipPrev();
        }
    }, { passive: true });

    // ============================================================
    //  التهيئة
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        // تحميل القرآن
        loadQuranData();

        // تحميل الأحاديث
        renderHadithPages();
        updateHadithUI();
    });
    </script>
</body>
</html>
